<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .title { font-size: 13px; font-weight: 600; fill: #1a1a2e; }
      .label { font-size: 10px; fill: #444; }
      .label-bold { font-size: 10px; fill: #1a1a2e; font-weight: 600; }
      .axis-label { font-size: 9px; fill: #666; }
      .annotation { font-size: 11px; fill: #0d7377; font-weight: 600; }
      .annotation-red { font-size: 11px; fill: #c0392b; font-weight: 600; }
      .grid-line { stroke: #e8e8e8; stroke-width: 0.5; }
      .axis-line { stroke: #333; stroke-width: 1; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="720" height="400" fill="#fafafa" rx="4"/>

  <!-- тХРтХРтХР LEFT PANEL: Avoided Crossing Level Diagram тХРтХРтХР -->
  <text x="185" y="22" text-anchor="middle" class="title">(a) Avoided Crossing: Eigenfrequencies vs. Detuning</text>

  <!-- Plot area: x=55..340, y=38..240 -->
  <line x1="55" y1="240" x2="340" y2="240" class="axis-line"/>
  <line x1="55" y1="38" x2="55" y2="240" class="axis-line"/>

  <!-- Y-axis -->
  <text x="18" y="139" text-anchor="middle" class="label-bold" transform="rotate(-90,18,139)">Eigenfrequency (kHz)</text>
  <text x="197" y="260" text-anchor="middle" class="label">Detuning ╬Фf / fтВА (log scale)</text>

  <!-- Grid -->
  <line x1="55" y1="80" x2="340" y2="80" class="grid-line"/>
  <line x1="55" y1="120" x2="340" y2="120" class="grid-line"/>
  <line x1="55" y1="160" x2="340" y2="160" class="grid-line"/>
  <line x1="55" y1="200" x2="340" y2="200" class="grid-line"/>

  <!-- Y-axis ticks: 152, 160, 170, 180, 188 kHz -->
  <text x="50" y="237" text-anchor="end" class="axis-label">152</text>
  <text x="50" y="197" text-anchor="end" class="axis-label">160</text>
  <text x="50" y="157" text-anchor="end" class="axis-label">170</text>
  <text x="50" y="117" text-anchor="end" class="axis-label">180</text>
  <text x="50" y="80" text-anchor="end" class="axis-label">188</text>

  <!-- X-axis ticks (log scale: 10тБ╗┬│ to 10тБ░) -->
  <!-- x=55 тЖТ ╬Фf/fтВА=10тБ╗┬│, x=150 тЖТ 10тБ╗┬▓, x=245 тЖТ 10тБ╗┬╣, x=340 тЖТ 10тБ░ -->
  <text x="55" y="272" text-anchor="middle" class="axis-label">10тБ╗┬│</text>
  <text x="150" y="272" text-anchor="middle" class="axis-label">10тБ╗┬▓</text>
  <text x="245" y="272" text-anchor="middle" class="axis-label">10тБ╗┬╣</text>
  <text x="340" y="272" text-anchor="middle" class="axis-label">10тБ░</text>

  <!-- Uncoupled frequencies (dashed grey) тАФ would cross -->
  <!-- Mode a: fa = 170 kHz (constant) тЖТ y тЙИ 157 -->
  <line x1="55" y1="157" x2="340" y2="157" stroke="#999" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <!-- Mode b: fb = 170 + ╬Фf. At ╬Фf/fтВА=10тБ╗┬│ тЖТ fb=170.17 тЖТ yтЙИ156.6; at 10тБ░ тЖТ fb=340 тЖТ y way off -->
  <!-- fb(detuning): at 10тБ╗┬│ y=156.6, 10тБ╗┬▓ y=153, 10тБ╗┬╣ y=120, 10тБ░ y=off-chart-high -->
  <!-- We show fb going from ~170 to ~188 over the range -->
  <path d="M55,156 L100,154 L150,147 L200,132 L245,108 L290,82 L340,50"
        fill="none" stroke="#999" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="345" y="160" class="axis-label" fill="#999">fтВР (bare)</text>
  <text x="345" y="53" class="axis-label" fill="#999">fс╡ж (bare)</text>

  <!-- Coupled eigenfrequencies тАФ avoided crossing -->
  <!-- Lower branch (bonding mode): starts at ~170, goes down at small detuning, then follows fa at large detuning -->
  <!-- At zero detuning: f┬▒ = 170 ┬▒ ╬║. With ╬║=0.05├Ч170=8.5 kHz. So fтБ╗=161.5, fтБ║=178.5 -->
  <!-- At ╬Фf/fтВА=10тБ╗┬│: nearly degenerate. fтБ╗тЙИ161.5 тЖТ y=200, fтБ║тЙИ178.5 тЖТ y=113 -->
  <!-- At ╬Фf/fтВА=10тБ╗┬▓: fтБ╗тЙИ161 тЖТ y=201, fтБ║тЙИ179 тЖТ y=112 -->
  <!-- At ╬Фf/fтВА=10тБ╗┬╣: starting to separate. fтБ╗=166 тЖТ y=175, fтБ║=181 тЖТ y=105 -->
  <!-- At ╬Фf/fтВА=10тБ░: fтБ╗тЙИ170 тЖТ y=157, fтБ║=340 тЖТ off chart (follow fb) -->

  <!-- Lower branch (red) -->
  <path d="M55,200 L80,200 L100,200 L120,199 L140,198 L160,195 L180,190 L200,182 L220,172 L240,163 L260,159 L280,158 L300,157 L320,157 L340,157"
        fill="none" stroke="#e74c3c" stroke-width="2.5"/>
  <!-- Upper branch (blue) -->
  <path d="M55,114 L80,114 L100,113 L120,113 L140,112 L160,109 L180,104 L200,95 L220,85 L240,76 L260,70 L280,65 L300,58 L320,52 L340,47"
        fill="none" stroke="#2980b9" stroke-width="2.5"/>

  <!-- Gap annotation at small detuning -->
  <line x1="60" y1="114" x2="60" y2="200" stroke="#0d7377" stroke-width="1"/>
  <line x1="56" y1="114" x2="64" y2="114" stroke="#0d7377" stroke-width="1"/>
  <line x1="56" y1="200" x2="64" y2="200" stroke="#0d7377" stroke-width="1"/>
  <text x="72" y="155" class="annotation" font-size="10">2╬║</text>
  <text x="72" y="168" class="annotation" font-size="9">= 17 kHz</text>

  <!-- Branch labels -->
  <text x="290" y="152" class="label-bold" fill="#e74c3c">fтБ╗ (bonding)</text>
  <text x="250" y="46" class="label-bold" fill="#2980b9">fтБ║ (antibonding)</text>

  <!-- Data points on curves -->
  <circle cx="55" cy="200" r="3" fill="#e74c3c"/>
  <circle cx="100" cy="200" r="3" fill="#e74c3c"/>
  <circle cx="150" cy="198" r="3" fill="#e74c3c"/>
  <circle cx="200" cy="182" r="3" fill="#e74c3c"/>
  <circle cx="245" cy="163" r="3" fill="#e74c3c"/>
  <circle cx="290" cy="158" r="3" fill="#e74c3c"/>
  <circle cx="340" cy="157" r="3" fill="#e74c3c"/>

  <circle cx="55" cy="114" r="3" fill="#2980b9"/>
  <circle cx="100" cy="113" r="3" fill="#2980b9"/>
  <circle cx="150" cy="112" r="3" fill="#2980b9"/>
  <circle cx="200" cy="95" r="3" fill="#2980b9"/>
  <circle cx="245" cy="76" r="3" fill="#2980b9"/>
  <circle cx="290" cy="65" r="3" fill="#2980b9"/>
  <circle cx="340" cy="47" r="3" fill="#2980b9"/>

  <!-- тХРтХРтХР RIGHT PANEL: Hybridisation Depth тХРтХРтХР -->
  <line x1="365" y1="18" x2="365" y2="290" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="545" y="22" text-anchor="middle" class="title">(b) Hybridisation Depth vs. Detuning</text>

  <!-- Plot area: x=400..680, y=38..240 -->
  <line x1="400" y1="240" x2="680" y2="240" class="axis-line"/>
  <line x1="400" y1="38" x2="400" y2="240" class="axis-line"/>

  <!-- Y-axis -->
  <text x="376" y="139" text-anchor="middle" class="label-bold" transform="rotate(-90,376,139)">Energy Transfer (%)</text>
  <text x="540" y="260" text-anchor="middle" class="label">Detuning ╬Фf / fтВА (log scale)</text>

  <!-- Grid -->
  <line x1="400" y1="80" x2="680" y2="80" class="grid-line"/>
  <line x1="400" y1="120" x2="680" y2="120" class="grid-line"/>
  <line x1="400" y1="160" x2="680" y2="160" class="grid-line"/>
  <line x1="400" y1="200" x2="680" y2="200" class="grid-line"/>

  <!-- Y-axis ticks -->
  <text x="395" y="243" text-anchor="end" class="axis-label">0</text>
  <text x="395" y="203" text-anchor="end" class="axis-label">20</text>
  <text x="395" y="163" text-anchor="end" class="axis-label">40</text>
  <text x="395" y="123" text-anchor="end" class="axis-label">60</text>
  <text x="395" y="83" text-anchor="end" class="axis-label">80</text>
  <text x="395" y="42" text-anchor="end" class="axis-label">100</text>

  <!-- X-axis (log): 10тБ╗┬│ to 10тБ░ -->
  <text x="400" y="272" text-anchor="middle" class="axis-label">10тБ╗┬│</text>
  <text x="493" y="272" text-anchor="middle" class="axis-label">10тБ╗┬▓</text>
  <text x="587" y="272" text-anchor="middle" class="axis-label">10тБ╗┬╣</text>
  <text x="680" y="272" text-anchor="middle" class="axis-label">10тБ░</text>

  <!-- 10% threshold line -->
  <line x1="400" y1="220" x2="680" y2="220" stroke="#e74c3c" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="684" y="222" class="axis-label" fill="#c0392b">10%</text>

  <!-- Hybridisation depth curve: ~100% at small detuning, dropping -->
  <!-- At ╬Фf/fтВА: 10тБ╗┬│тЖТ100%, 3├Ч10тБ╗┬│тЖТ99%, 10тБ╗┬▓тЖТ96%, 3├Ч10тБ╗┬▓тЖТ78%, 10тБ╗┬╣тЖТ25%, 3├Ч10тБ╗┬╣тЖТ5%, 10тБ░тЖТ1% -->
  <!-- x mapping: 400=10тБ╗┬│, 493=10тБ╗┬▓, 587=10тБ╗┬╣, 680=10тБ░ -->
  <!-- y mapping: 240=0%, 38=100% (range 202px for 100%) -->

  <!-- Data points and curve -->
  <path d="M400,38 L415,38 L430,39 L445,39 L460,40 L475,41 L493,46 L510,55 L525,68 L540,88 L555,115 L570,148 L587,190 L600,210 L615,225 L630,232 L645,236 L660,238 L680,239"
        fill="none" stroke="#8e44ad" stroke-width="2.5"/>

  <!-- Fill under curve to 10% threshold -->
  <path d="M400,38 L415,38 L430,39 L445,39 L460,40 L475,41 L493,46 L510,55 L525,68 L540,88 L555,115 L570,148 L575,158 L575,220 L400,220 Z"
        fill="#8e44ad" opacity="0.1"/>

  <!-- Data points -->
  <circle cx="400" cy="38" r="3.5" fill="#8e44ad"/>
  <circle cx="430" cy="39" r="3.5" fill="#8e44ad"/>
  <circle cx="460" cy="40" r="3.5" fill="#8e44ad"/>
  <circle cx="493" cy="46" r="3.5" fill="#8e44ad"/>
  <circle cx="510" cy="55" r="3" fill="#8e44ad"/>
  <circle cx="525" cy="68" r="3.5" fill="#8e44ad"/>
  <circle cx="540" cy="88" r="3.5" fill="#8e44ad"/>
  <circle cx="555" cy="115" r="3.5" fill="#8e44ad"/>
  <circle cx="570" cy="148" r="3.5" fill="#8e44ad"/>
  <circle cx="587" cy="190" r="3.5" fill="#8e44ad"/>
  <circle cx="600" cy="210" r="3" fill="#8e44ad"/>
  <circle cx="615" cy="225" r="3" fill="#999"/>
  <circle cx="630" cy="232" r="3" fill="#999"/>
  <circle cx="645" cy="236" r="3" fill="#999"/>
  <circle cx="680" cy="239" r="3" fill="#999"/>

  <!-- 16/20 annotation -->
  <text x="490" y="215" text-anchor="middle" class="annotation" font-size="10">16 of 20 points</text>
  <text x="490" y="228" text-anchor="middle" class="annotation" font-size="9">above 10% threshold</text>

  <!-- 100% annotation -->
  <text x="450" y="34" class="annotation" font-size="10" fill="#8e44ad">~100% at degeneracy</text>

  <!-- Grey zone label for <10% -->
  <text x="650" y="213" text-anchor="middle" class="axis-label" fill="#999">&lt; 10%</text>

  <!-- Bottom summary -->
  <rect x="50" y="310" width="620" height="78" rx="6" fill="#f0f7f7" stroke="#0d7377" stroke-width="0.8"/>
  <text x="360" y="330" text-anchor="middle" class="label-bold" font-size="11">Simulated: avoided crossing creates bonus information channels</text>
  <text x="360" y="348" text-anchor="middle" class="label" font-size="10">Near-degenerate mode pairs hybridise into bonding/antibonding modes with frequency gap 2╬║.</text>
  <text x="360" y="364" text-anchor="middle" class="label" font-size="10">At small detuning (╬Фf/fтВА &lt; 0.01), energy exchange reaches 100% тАФ fully hybrid modes carry</text>
  <text x="360" y="380" text-anchor="middle" class="label" font-size="10">independent information. From a 10-mode system: 16 hybrid channels тЖТ +160% capacity gain.</text>
</svg>
