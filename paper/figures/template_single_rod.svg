<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 612 792" width="8.5in" height="11in">
  <!-- US Letter: 612×792 pt (8.5×11 in). Print at 100% scale. -->
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .title { font-size: 14pt; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 10pt; fill: #444; }
    .label { font-size: 8.5pt; fill: #1a1a1a; }
    .dim { font-size: 7.5pt; fill: #c00; font-weight: 600; }
    .note { font-size: 7pt; fill: #555; font-style: italic; }
    .cut-line { stroke: #333; stroke-width: 1.2; stroke-dasharray: 6,3; fill: none; }
    .fold-line { stroke: #999; stroke-width: 0.8; stroke-dasharray: 2,2; fill: none; }
    .dim-line { stroke: #c00; stroke-width: 0.6; fill: none; }
    .dim-arrow { fill: #c00; stroke: none; }
    .pinhole { fill: none; stroke: #c00; stroke-width: 1.5; }
    .crosshair { stroke: #c00; stroke-width: 0.5; stroke-dasharray: 2,1; }
    .cooler-ghost { fill: none; stroke: #aaa; stroke-width: 0.8; stroke-dasharray: 4,2; }
    .rod-ghost { fill: none; stroke: #2a7fff; stroke-width: 1; stroke-dasharray: 3,2; }
  </style>

  <!-- Page title -->
  <text x="306" y="36" text-anchor="middle" class="title">CWM Experiment Guide — Cardboard Divider Template (Single Rod)</text>
  <text x="306" y="52" text-anchor="middle" class="subtitle">Print at 100% (no scaling) on US Letter paper. Verify the ruler below measures 50 mm.</text>

  <!-- Calibration ruler -->
  <g transform="translate(206, 62)">
    <rect x="0" y="0" width="141.73" height="12" fill="none" stroke="#333" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="0" y2="12" stroke="#333" stroke-width="0.8"/>
    <line x1="141.73" y1="0" x2="141.73" y2="12" stroke="#333" stroke-width="0.8"/>
    <line x1="28.35" y1="0" x2="28.35" y2="8" stroke="#333" stroke-width="0.5"/>
    <line x1="56.69" y1="0" x2="56.69" y2="8" stroke="#333" stroke-width="0.5"/>
    <line x1="85.04" y1="0" x2="85.04" y2="8" stroke="#333" stroke-width="0.5"/>
    <line x1="113.39" y1="0" x2="113.39" y2="8" stroke="#333" stroke-width="0.5"/>
    <line x1="14.17" y1="0" x2="14.17" y2="5" stroke="#333" stroke-width="0.3"/>
    <line x1="42.52" y1="0" x2="42.52" y2="5" stroke="#333" stroke-width="0.3"/>
    <line x1="70.87" y1="0" x2="70.87" y2="5" stroke="#333" stroke-width="0.3"/>
    <line x1="99.21" y1="0" x2="99.21" y2="5" stroke="#333" stroke-width="0.3"/>
    <line x1="127.56" y1="0" x2="127.56" y2="5" stroke="#333" stroke-width="0.3"/>
    <text x="0" y="24" class="label" text-anchor="middle">0</text>
    <text x="28.35" y="24" class="label" text-anchor="middle">10</text>
    <text x="56.69" y="24" class="label" text-anchor="middle">20</text>
    <text x="85.04" y="24" class="label" text-anchor="middle">30</text>
    <text x="113.39" y="24" class="label" text-anchor="middle">40</text>
    <text x="141.73" y="24" class="label" text-anchor="middle">50 mm</text>
  </g>

  <!-- ================================================================== -->
  <!-- DIVIDER — 165mm × 140mm (CH-BOX interior cross-section)            -->
  <!-- 165mm = 467.72 pt, 140mm = 396.85 pt                              -->
  <!-- Centered: x = (612-467.72)/2 = 72.14                              -->
  <!-- ================================================================== -->

  <text x="72" y="116" class="label" font-weight="700">SINGLE-ROD DIVIDER — cut 165 mm × 140 mm (6.5″ × 5.5″)</text>
  <text x="72" y="130" class="note">Sized for CH-BOX insulated shipping box (item 11). If using a different box, measure interior and adjust.</text>

  <g transform="translate(72, 145)">
    <!-- Outer cut line -->
    <rect x="0" y="0" width="467.72" height="396.85" class="cut-line" rx="2"/>

    <!-- Dimension: width -->
    <line x1="0" y1="-12" x2="467.72" y2="-12" class="dim-line"/>
    <line x1="0" y1="-18" x2="0" y2="-6" class="dim-line"/>
    <line x1="467.72" y1="-18" x2="467.72" y2="-6" class="dim-line"/>
    <text x="233.86" y="-16" text-anchor="middle" class="dim">165 mm (6.5″)</text>

    <!-- Dimension: height -->
    <line x1="-12" y1="0" x2="-12" y2="396.85" class="dim-line"/>
    <line x1="-18" y1="0" x2="-6" y2="0" class="dim-line"/>
    <line x1="-18" y1="396.85" x2="-6" y2="396.85" class="dim-line"/>
    <text x="-24" y="198.43" text-anchor="middle" class="dim" transform="rotate(-90, -24, 198.43)">140 mm (5.5″)</text>

    <!-- Center lines -->
    <line x1="0" y1="198.43" x2="467.72" y2="198.43" class="fold-line"/>
    <line x1="233.86" y1="0" x2="233.86" y2="396.85" class="fold-line"/>
    <text x="467.72" y="195" text-anchor="end" class="note">rod height center line</text>

    <!-- Pinhole — centered -->
    <circle cx="233.86" cy="198.43" r="9.92" class="pinhole"/>
    <line x1="218" y1="198.43" x2="250" y2="198.43" class="crosshair"/>
    <line x1="233.86" y1="183" x2="233.86" y2="214" class="crosshair"/>
    <text x="233.86" y="228" text-anchor="middle" class="dim">⊙ 7 mm pinhole</text>
    <text x="233.86" y="240" text-anchor="middle" class="note">(use 7 mm hollow punch, item 22)</text>

    <!-- PZT side label -->
    <text x="8" y="198" text-anchor="start" class="label" fill="#2a7fff">← PZT this side</text>
    <text x="6" y="16" class="note">✂ cut along dashed line</text>
  </g>

  <!-- Side-view spacing guide -->
  <text x="72" y="588" class="label" font-weight="700">Side View — Divider Spacing Inside Box (150 mm rod)</text>
  <text x="72" y="602" class="note">Cut TWO identical dividers. Stand upright inside box, 75 mm apart. Rod slides horizontally through aligned pinholes.</text>

  <g transform="translate(90, 620)">
    <!-- Box side view: ~200mm long -->
    <rect x="0" y="0" width="500" height="50" class="cooler-ghost" rx="3"/>
    <text x="-4" y="28" text-anchor="end" class="note">box</text>
    <text x="502" y="28" class="note">(9″)</text>

    <!-- Rod -->
    <line x1="25" y1="25" x2="400" y2="25" class="rod-ghost"/>
    <text x="402" y="22" class="note" fill="#2a7fff">rod 150 mm</text>

    <!-- Divider A at ~37.5mm from PZT end -->
    <line x1="119" y1="-3" x2="119" y2="53" stroke="#333" stroke-width="2"/>
    <text x="119" y="66" text-anchor="middle" class="dim">A (L/4)</text>

    <!-- Divider B at ~112.5mm -->
    <line x1="306" y1="-3" x2="306" y2="53" stroke="#333" stroke-width="2"/>
    <text x="306" y="66" text-anchor="middle" class="dim">B (3L/4)</text>

    <!-- 75mm spacing -->
    <line x1="119" y1="-8" x2="306" y2="-8" class="dim-line"/>
    <polygon points="119,-8 125,-5 125,-11" class="dim-arrow"/>
    <polygon points="306,-8 300,-5 300,-11" class="dim-arrow"/>
    <text x="212.5" y="-12" text-anchor="middle" class="dim">75 mm</text>

    <!-- PZT -->
    <rect x="11" y="18" width="14" height="14" fill="#2a7fff" fill-opacity="0.3" stroke="#2a7fff" stroke-width="0.8"/>
    <text x="18" y="14" text-anchor="middle" class="note" fill="#2a7fff">PZT</text>
    <text x="18" y="-3" text-anchor="middle" class="note">↑ notch lid here</text>
  </g>

  <!-- Footer -->
  <text x="306" y="750" text-anchor="middle" class="note">Template T.1 — CWM Macro-Scale Experiment Guide — github.com/miketierce/wcfoma</text>
  <text x="306" y="762" text-anchor="middle" class="note">If using a different enclosure, measure its interior cross-section and cut cardboard to match.</text>
</svg>
