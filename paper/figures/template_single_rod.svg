<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 612 792" width="612" height="792">
  <!-- US Letter: 612×792 pt (8.5×11 in). Print at 100% scale. -->
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .title { font-size: 14pt; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 10pt; fill: #444; }
    .label { font-size: 8.5pt; fill: #1a1a1a; }
    .dim { font-size: 7.5pt; fill: #c00; font-weight: 600; }
    .note { font-size: 7pt; fill: #555; font-style: italic; }
    .inst { font-size: 7.5pt; fill: #333; }
    .cut-line { stroke: #333; stroke-width: 1.2; stroke-dasharray: 6,3; fill: none; }
    .fold-line { stroke: #999; stroke-width: 0.8; stroke-dasharray: 2,2; fill: none; }
    .dim-line { stroke: #c00; stroke-width: 0.6; fill: none; }
    .dim-arrow { fill: #c00; stroke: none; }
    .pinhole { fill: none; stroke: #c00; stroke-width: 1.5; }
    .crosshair { stroke: #c00; stroke-width: 0.5; stroke-dasharray: 2,1; }
    .outline { fill: #fafaf5; stroke: #333; stroke-width: 1.2; }
    .cooler-ghost { fill: none; stroke: #aaa; stroke-width: 0.8; stroke-dasharray: 4,2; }
    .rod-ghost { fill: none; stroke: #2a7fff; stroke-width: 1; stroke-dasharray: 3,2; }
  </style>

  <!-- Page title -->
  <text x="306" y="36" text-anchor="middle" class="title">CWM Experiment Guide — Cardboard Divider Template (Single Rod)</text>
  <text x="306" y="52" text-anchor="middle" class="subtitle">Print at 100% (no scaling) on US Letter paper. Verify the ruler below measures 50 mm.</text>

  <!-- Calibration ruler -->
  <g transform="translate(206, 62)">
    <rect x="0" y="0" width="188.98" height="12" fill="none" stroke="#333" stroke-width="0.8"/>
    <!-- 50 mm = 141.73 pt -->
    <line x1="0" y1="0" x2="0" y2="12" stroke="#333" stroke-width="0.8"/>
    <line x1="141.73" y1="0" x2="141.73" y2="12" stroke="#333" stroke-width="0.8"/>
    <!-- 10mm ticks -->
    <line x1="28.35" y1="0" x2="28.35" y2="8" stroke="#333" stroke-width="0.5"/>
    <line x1="56.69" y1="0" x2="56.69" y2="8" stroke="#333" stroke-width="0.5"/>
    <line x1="85.04" y1="0" x2="85.04" y2="8" stroke="#333" stroke-width="0.5"/>
    <line x1="113.39" y1="0" x2="113.39" y2="8" stroke="#333" stroke-width="0.5"/>
    <!-- 5mm ticks -->
    <line x1="14.17" y1="0" x2="14.17" y2="5" stroke="#333" stroke-width="0.3"/>
    <line x1="42.52" y1="0" x2="42.52" y2="5" stroke="#333" stroke-width="0.3"/>
    <line x1="70.87" y1="0" x2="70.87" y2="5" stroke="#333" stroke-width="0.3"/>
    <line x1="99.21" y1="0" x2="99.21" y2="5" stroke="#333" stroke-width="0.3"/>
    <line x1="127.56" y1="0" x2="127.56" y2="5" stroke="#333" stroke-width="0.3"/>
    <text x="0" y="24" class="label" text-anchor="middle">0</text>
    <text x="28.35" y="24" class="label" text-anchor="middle">10</text>
    <text x="56.69" y="24" class="label" text-anchor="middle">20</text>
    <text x="85.04" y="24" class="label" text-anchor="middle">30</text>
    <text x="113.39" y="24" class="label" text-anchor="middle">40</text>
    <text x="141.73" y="24" class="label" text-anchor="middle">50 mm</text>
  </g>

  <!-- ================================================================== -->
  <!-- DIVIDER A (front divider — PZT side)                                -->
  <!-- Template shown at 1:1 scale for a typical small cooler interior    -->
  <!-- Interior ~200mm wide × ~130mm tall → 566.9 pt × 368.5 pt          -->
  <!-- We show 180mm × 110mm outline to fit page with margins             -->
  <!-- 180mm = 510.24pt, 110mm = 311.81pt                                -->
  <!-- ================================================================== -->

  <text x="56" y="116" class="label" font-weight="700">DIVIDER A (front — PZT side)</text>
  <text x="56" y="130" class="note">Trace this outline onto cardboard. Trim width and height to fit your cooler interior snugly.</text>

  <!-- Divider outline — centered horizontally, at y=145 -->
  <!-- 180mm wide × 110mm tall, centered at x=306 -->
  <!-- x_left = 306 - 255.12 = 50.88, x_right = 306 + 255.12 = 561.12 -->
  <!-- Actually let's use 170mm × 100mm to fit better: 481.89 × 283.46 pt -->
  <!-- x_left = 306 - 240.94 = 65.06, y_top = 145 -->
  <g transform="translate(65, 145)">
    <!-- Outer cut line -->
    <rect x="0" y="0" width="481.89" height="283.46" class="cut-line" rx="2"/>

    <!-- Dimension: width -->
    <line x1="0" y1="-12" x2="481.89" y2="-12" class="dim-line"/>
    <line x1="0" y1="-18" x2="0" y2="-6" class="dim-line"/>
    <line x1="481.89" y1="-18" x2="481.89" y2="-6" class="dim-line"/>
    <text x="240.94" y="-16" text-anchor="middle" class="dim">← measure your cooler interior width →</text>

    <!-- Dimension: height -->
    <line x1="-12" y1="0" x2="-12" y2="283.46" class="dim-line"/>
    <line x1="-18" y1="0" x2="-6" y2="0" class="dim-line"/>
    <line x1="-18" y1="283.46" x2="-6" y2="283.46" class="dim-line"/>
    <text x="-24" y="141.73" text-anchor="middle" class="dim" transform="rotate(-90, -24, 141.73)">← cooler interior depth →</text>

    <!-- Trim guides at corners -->
    <text x="6" y="16" class="note">✂ trim to fit</text>

    <!-- Center line (horizontal — the rod height) -->
    <!-- Rod at ~40% from bottom for good clearance: 100mm × 0.4 = 40mm from bottom = 60mm from top -->
    <!-- 60mm from top = 170.08 pt -->
    <line x1="0" y1="170.08" x2="481.89" y2="170.08" class="fold-line"/>
    <text x="481.89" y="167" text-anchor="end" class="note">rod height line (adjust to center rod in your cooler)</text>

    <!-- PINHOLE for single rod — centered horizontally -->
    <!-- Center: x = 240.94, y = 170.08 -->
    <circle cx="240.94" cy="170.08" r="9.92" class="pinhole"/>
    <!-- 7mm diameter = 3.5mm radius = 9.92 pt radius -->
    <!-- Crosshair -->
    <line x1="225" y1="170.08" x2="257" y2="170.08" class="crosshair"/>
    <line x1="240.94" y1="155" x2="240.94" y2="185" class="crosshair"/>

    <!-- Label the pinhole -->
    <text x="240.94" y="200" text-anchor="middle" class="dim">⊙ 7 mm pinhole</text>
    <text x="240.94" y="212" text-anchor="middle" class="note">(punch with pushpin, enlarge with pencil tip)</text>

    <!-- Arrow indicating PZT protrudes this side -->
    <text x="8" y="170" text-anchor="start" class="label" fill="#2a7fff">← PZT this side</text>
  </g>

  <!-- ================================================================== -->
  <!-- DIVIDER B (rear divider)                                            -->
  <!-- Identical to A but no PZT notation                                 -->
  <!-- ================================================================== -->

  <text x="56" y="460" class="label" font-weight="700">DIVIDER B (rear support)</text>
  <text x="56" y="474" class="note">Identical pinhole position. The two dividers space 75 mm apart inside the cooler (for 150 mm rod).</text>

  <g transform="translate(65, 488)">
    <!-- Outer cut line — same size -->
    <rect x="0" y="0" width="481.89" height="198.43" class="cut-line" rx="2"/>
    <!-- Shorter: 70mm = 198.43 pt (save page space — Divider B can be shorter since it's the same layout) -->

    <!-- Center line -->
    <line x1="0" y1="113.39" x2="481.89" y2="113.39" class="fold-line"/>
    <text x="481.89" y="110" text-anchor="end" class="note">rod height line (same height as Divider A)</text>

    <!-- PINHOLE — same horizontal center -->
    <circle cx="240.94" cy="113.39" r="9.92" class="pinhole"/>
    <line x1="225" y1="113.39" x2="257" y2="113.39" class="crosshair"/>
    <line x1="240.94" y1="98" x2="240.94" y2="129" class="crosshair"/>
    <text x="240.94" y="143" text-anchor="middle" class="dim">⊙ 7 mm pinhole</text>
    <text x="240.94" y="155" text-anchor="middle" class="note">(must match Divider A height exactly)</text>
  </g>

  <!-- ================================================================== -->
  <!-- SPACING GUIDE (side view of cooler)                                 -->
  <!-- ================================================================== -->

  <text x="56" y="718" class="label" font-weight="700">Side View — Divider Spacing (150 mm rod)</text>

  <g transform="translate(80, 728)">
    <!-- Cooler outline (side view) -->
    <rect x="0" y="0" width="425.2" height="42.52" class="cooler-ghost" rx="3"/>
    <!-- 150mm = 425.2 pt, H = 15mm = 42.52 pt -->
    <text x="-4" y="24" text-anchor="end" class="note">cooler</text>

    <!-- Rod (horizontal line through middle) -->
    <line x1="-14.17" y1="21.26" x2="439.37" y2="21.26" class="rod-ghost"/>
    <text x="439.37" y="18" class="note" fill="#2a7fff">rod (150 mm)</text>

    <!-- Divider A at L/4 = 37.5mm = 106.3 pt from rod start -->
    <!-- Rod starts at x=0 (let's say PZT end is left) -->
    <!-- PZT protrudes left of Divider A -->
    <!-- Divider A at x = 37.5mm from PZT end, so at x = 106.3 -->
    <line x1="106.3" y1="-3" x2="106.3" y2="45" stroke="#333" stroke-width="2"/>
    <text x="106.3" y="56" text-anchor="middle" class="dim">A</text>
    <text x="106.3" y="66" text-anchor="middle" class="note">37.5 mm</text>

    <!-- Divider B at 3L/4 = 112.5mm = 318.9 pt from rod start -->
    <line x1="318.9" y1="-3" x2="318.9" y2="45" stroke="#333" stroke-width="2"/>
    <text x="318.9" y="56" text-anchor="middle" class="dim">B</text>
    <text x="318.9" y="66" text-anchor="middle" class="note">112.5 mm</text>

    <!-- Spacing dimension between A and B: 75mm = 212.6 pt -->
    <line x1="106.3" y1="-8" x2="318.9" y2="-8" class="dim-line"/>
    <polygon points="106.3,-8 112,-5 112,-11" class="dim-arrow"/>
    <polygon points="318.9,-8 313,-5 313,-11" class="dim-arrow"/>
    <text x="212.6" y="-12" text-anchor="middle" class="dim">75 mm spacing</text>

    <!-- PZT at left end -->
    <rect x="-14.17" y="14.17" width="14.17" height="14.17" fill="#2a7fff" fill-opacity="0.3" stroke="#2a7fff" stroke-width="0.8"/>
    <text x="-7" y="10" text-anchor="middle" class="note" fill="#2a7fff">PZT</text>
  </g>
</svg>
