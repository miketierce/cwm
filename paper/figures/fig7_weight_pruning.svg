  <rect x="420" y="72" width="100" height="28" rx="4" fill="#0d7377" opacity="0.1" stroke="#0d7377" stroke-width="0.5"/>
  <text x="470" y="85" text-anchor="middle" class="annotation">θ* = 0.055</text>
  <text x="470" y="96" text-anchor="middle" class="axis-label" fill="#0d7377">Recall = 0.775</text>

