  <line x1="404" y1="202" x2="412" y2="202" stroke="#0d7377" stroke-width="1"/>
  <line x1="404" y1="153" x2="412" y2="153" stroke="#0d7377" stroke-width="1"/>
  <text x="418" y="182" class="annotation">+10.7%</text>

