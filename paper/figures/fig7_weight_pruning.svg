  <text x="180" y="232" text-anchor="middle" class="label" font-style="italic">inter-pattern crosstalk noise — a firmware-only</text>
  <text x="180" y="246" text-anchor="middle" class="label" font-style="italic">optimisation requiring zero hardware changes.</text>

