<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 410" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2563eb"/></marker>
    <marker id="arrowD" markerWidth="6" markerHeight="8" refX="3" refY="8" orient="auto"><path d="M0,0 L3,8 L6,0" fill="#2563eb"/></marker>
    <marker id="arrowU" markerWidth="6" markerHeight="8" refX="3" refY="0" orient="auto"><path d="M0,8 L3,0 L6,8" fill="#2563eb"/></marker>
    <linearGradient id="rodGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="50%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="piezoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="410" fill="white" rx="4"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">Figure 1 · SEM Architecture — From Physics to Computation</text>

  <!-- ═══ LAYER 1: Physical Resonator ═══ -->
  <rect x="30" y="50" width="200" height="130" rx="6" fill="#f0f9ff" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="130" y="68" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">PHYSICAL RESONATOR</text>

  <!-- Glass rod -->
  <rect x="55" y="85" width="150" height="18" rx="9" fill="url(#rodGrad)" stroke="#3b82f6" stroke-width="1"/>
  <text x="130" y="97" text-anchor="middle" font-size="7.5" fill="#1e3a5f">Glass Rod (L = 1 mm)</text>

  <!-- Piezo elements -->
  <rect x="55" y="78" width="20" height="7" rx="2" fill="url(#piezoGrad)" stroke="#d97706" stroke-width="0.7"/>
  <rect x="185" y="78" width="20" height="7" rx="2" fill="url(#piezoGrad)" stroke="#d97706" stroke-width="0.7"/>
  <text x="65" y="76" text-anchor="middle" font-size="6" fill="#92400e">AlN</text>
  <text x="195" y="76" text-anchor="middle" font-size="6" fill="#92400e">AlN</text>

  <!-- Tethers -->
  <line x1="50" y1="94" x2="55" y2="94" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="205" y1="94" x2="210" y2="94" stroke="#6b7280" stroke-width="1.5"/>
  <rect x="42" y="88" width="8" height="12" rx="1" fill="#e5e7eb" stroke="#9ca3af" stroke-width="0.7"/>
  <rect x="210" y="88" width="8" height="12" rx="1" fill="#e5e7eb" stroke="#9ca3af" stroke-width="0.7"/>

  <!-- Perturbation dots -->
  <circle cx="95" cy="85" r="3" fill="#ef4444" opacity="0.8"/>
  <circle cx="140" cy="85" r="2.5" fill="#ef4444" opacity="0.8"/>
  <circle cx="170" cy="85" r="3.5" fill="#ef4444" opacity="0.8"/>
  <text x="130" y="120" text-anchor="middle" font-size="6.5" fill="#dc2626">● Mass perturbations (data)</text>

  <!-- Standing wave hint -->
  <path d="M60,145 Q80,133 100,145 Q120,157 140,145 Q160,133 180,145 Q190,153 200,145" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5" stroke-dasharray="2,2"/>
  <text x="130" y="168" text-anchor="middle" font-size="6.5" fill="#3b82f6">~ Standing waves (modes) ~</text>

  <!-- ═══ LAYER 2: Spectral Domain ═══ -->
  <rect x="260" y="50" width="200" height="130" rx="6" fill="#fefce8" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="360" y="68" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">SPECTRAL DOMAIN</text>

  <!-- Frequency spectrum -->
  <line x1="280" y1="150" x2="440" y2="150" stroke="#9ca3af" stroke-width="0.8"/>
  <text x="440" y="163" text-anchor="end" font-size="6" fill="#6b7280">frequency →</text>

  <!-- Spectral peaks -->
  <line x1="295" y1="150" x2="295" y2="90" stroke="#2563eb" stroke-width="2"/>
  <line x1="315" y1="150" x2="315" y2="100" stroke="#2563eb" stroke-width="2"/>
  <line x1="335" y1="150" x2="335" y2="85" stroke="#2563eb" stroke-width="2"/>
  <line x1="355" y1="150" x2="355" y2="105" stroke="#2563eb" stroke-width="2"/>
  <line x1="375" y1="150" x2="375" y2="92" stroke="#2563eb" stroke-width="2"/>
  <line x1="395" y1="150" x2="395" y2="110" stroke="#2563eb" stroke-width="2"/>
  <line x1="415" y1="150" x2="415" y2="95" stroke="#2563eb" stroke-width="2"/>
  <line x1="435" y1="150" x2="435" y2="115" stroke="#2563eb" stroke-width="2"/>

  <!-- Mode labels -->
  <text x="295" y="82" text-anchor="middle" font-size="6" fill="#1e40af">f₁</text>
  <text x="335" y="78" text-anchor="middle" font-size="6" fill="#1e40af">f₃</text>
  <text x="375" y="85" text-anchor="middle" font-size="6" fill="#1e40af">f₅</text>
  <text x="415" y="88" text-anchor="middle" font-size="6" fill="#1e40af">f₇</text>

  <!-- Shifted peaks (dashed) -->
  <line x1="298" y1="150" x2="298" y2="92" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="337" y1="150" x2="337" y2="88" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="378" y1="150" x2="378" y2="95" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Legend -->
  <line x1="280" y1="170" x2="295" y2="170" stroke="#2563eb" stroke-width="2"/>
  <text x="298" y="173" font-size="6" fill="#1e40af">Unperturbed</text>
  <line x1="350" y1="170" x2="365" y2="170" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="368" y="173" font-size="6" fill="#dc2626">After perturbation (Δf)</text>

  <!-- ═══ LAYER 3: Computation ═══ -->
  <rect x="490" y="50" width="200" height="130" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
  <text x="590" y="68" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">ASSOCIATIVE RECALL</text>

  <!-- Multiple rods -->
  <rect x="510" y="82" width="80" height="8" rx="4" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.7"/>
  <rect x="510" y="96" width="80" height="8" rx="4" fill="#86efac" stroke="#16a34a" stroke-width="0.7"/>
  <rect x="510" y="110" width="80" height="8" rx="4" fill="#fca5a5" stroke="#ef4444" stroke-width="0.7"/>
  <rect x="510" y="124" width="80" height="8" rx="4" fill="#c4b5fd" stroke="#7c3aed" stroke-width="0.7"/>

  <text x="600" y="89" font-size="6.5" fill="#1e3a5f">Rod 1: pattern A</text>
  <text x="600" y="103" font-size="6.5" fill="#166534">Rod 2: pattern B ★</text>
  <text x="600" y="117" font-size="6.5" fill="#991b1b">Rod 3: pattern C</text>
  <text x="600" y="131" font-size="6.5" fill="#5b21b6">Rod 4: pattern D</text>

  <!-- Query arrow -->
  <text x="550" y="78" text-anchor="middle" font-size="7" font-weight="600" fill="#166534">Query spectrum →</text>

  <!-- Response bars -->
  <rect x="520" y="148" width="15" height="18" rx="2" fill="#93c5fd" opacity="0.6"/>
  <rect x="545" y="138" width="15" height="28" rx="2" fill="#86efac"/>
  <rect x="570" y="152" width="15" height="14" rx="2" fill="#fca5a5" opacity="0.6"/>
  <rect x="595" y="155" width="15" height="11" rx="2" fill="#c4b5fd" opacity="0.6"/>
  <text x="553" y="135" text-anchor="middle" font-size="6" font-weight="700" fill="#166534">MATCH</text>
  <text x="560" y="176" text-anchor="middle" font-size="6" fill="#6b7280">Response amplitude</text>

  <!-- ═══ Connecting arrows ═══ -->
  <line x1="230" y1="115" x2="258" y2="115" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="244" y="110" text-anchor="middle" font-size="6" fill="#2563eb">FFT</text>

  <line x1="460" y1="115" x2="488" y2="115" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="474" y="110" text-anchor="middle" font-size="6" fill="#2563eb">Drive</text>

  <!-- ═══ BOTTOM: Data Flow ═══ -->
  <rect x="30" y="205" width="660" height="55" rx="6" fill="#f8fafc" stroke="#d1d5db" stroke-width="1"/>
  <text x="360" y="222" text-anchor="middle" font-size="10" font-weight="700" fill="#374151">DATA FLOW</text>

  <!-- Flow boxes -->
  <rect x="50" y="232" width="90" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="95" y="246" text-anchor="middle" font-size="7.5" font-weight="600" fill="#1e40af">WRITE</text>

  <rect x="185" y="232" width="90" height="22" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="230" y="246" text-anchor="middle" font-size="7.5" font-weight="600" fill="#92400e">STORE</text>

  <rect x="320" y="232" width="90" height="22" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="365" y="246" text-anchor="middle" font-size="7.5" font-weight="600" fill="#166534">READ</text>

  <rect x="455" y="232" width="90" height="22" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="500" y="246" text-anchor="middle" font-size="7.5" font-weight="600" fill="#5b21b6">COMPUTE</text>

  <rect x="590" y="232" width="90" height="22" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="635" y="246" text-anchor="middle" font-size="7.5" font-weight="600" fill="#991b1b">RESULT</text>

  <!-- Flow arrows -->
  <line x1="140" y1="243" x2="183" y2="243" stroke="#6b7280" stroke-width="1" marker-end="url(#arrowR)"/>
  <line x1="275" y1="243" x2="318" y2="243" stroke="#6b7280" stroke-width="1" marker-end="url(#arrowR)"/>
  <line x1="410" y1="243" x2="453" y2="243" stroke="#6b7280" stroke-width="1" marker-end="url(#arrowR)"/>
  <line x1="545" y1="243" x2="588" y2="243" stroke="#6b7280" stroke-width="1" marker-end="url(#arrowR)"/>

  <!-- Sub-labels -->
  <text x="95" y="262" text-anchor="middle" font-size="5.5" fill="#6b7280">Attach mass</text>
  <text x="95" y="269" text-anchor="middle" font-size="5.5" fill="#6b7280">perturbation</text>
  <text x="230" y="262" text-anchor="middle" font-size="5.5" fill="#6b7280">Mode amplitudes</text>
  <text x="230" y="269" text-anchor="middle" font-size="5.5" fill="#6b7280">{a₁, a₂, ... aₙ}</text>
  <text x="365" y="262" text-anchor="middle" font-size="5.5" fill="#6b7280">Piezo sense</text>
  <text x="365" y="269" text-anchor="middle" font-size="5.5" fill="#6b7280">+ FFT</text>
  <text x="500" y="262" text-anchor="middle" font-size="5.5" fill="#6b7280">Wave interference</text>
  <text x="500" y="269" text-anchor="middle" font-size="5.5" fill="#6b7280">= dot product</text>
  <text x="635" y="262" text-anchor="middle" font-size="5.5" fill="#6b7280">Best-match</text>
  <text x="635" y="269" text-anchor="middle" font-size="5.5" fill="#6b7280">rod identified</text>

  <!-- ═══ KEY INSIGHT BOX ═══ -->
  <rect x="30" y="285" width="660" height="40" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.2"/>
  <text x="360" y="302" text-anchor="middle" font-size="9" font-weight="700" fill="#991b1b">KEY INSIGHT: Storage and computation are the same physical process.</text>
  <text x="360" y="316" text-anchor="middle" font-size="8" fill="#6b7280">Wave interference simultaneously reads the stored data and computes the nearest-neighbor match. No data movement. No separate processor.</text>

  <!-- ═══ COMPARISON: Von Neumann vs SEM ═══ -->
  <!-- Von Neumann -->
  <rect x="30" y="340" width="310" height="60" rx="6" fill="#fafafa" stroke="#d1d5db" stroke-width="1"/>
  <text x="185" y="356" text-anchor="middle" font-size="8" font-weight="700" fill="#6b7280">Conventional (von Neumann)</text>
  <rect x="50" y="365" width="55" height="22" rx="3" fill="#e5e7eb" stroke="#9ca3af" stroke-width="0.7"/>
  <text x="78" y="379" text-anchor="middle" font-size="7" fill="#374151">CPU</text>
  <rect x="145" y="365" width="55" height="22" rx="3" fill="#e5e7eb" stroke="#9ca3af" stroke-width="0.7"/>
  <text x="173" y="379" text-anchor="middle" font-size="7" fill="#374151">Bus</text>
  <rect x="240" y="365" width="55" height="22" rx="3" fill="#e5e7eb" stroke="#9ca3af" stroke-width="0.7"/>
  <text x="268" y="379" text-anchor="middle" font-size="7" fill="#374151">Memory</text>
  <line x1="105" y1="376" x2="143" y2="376" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowR)"/>
  <line x1="200" y1="376" x2="238" y2="376" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="155" y="397" text-anchor="middle" font-size="6" fill="#ef4444">⚡ Bottleneck: data must travel</text>

  <!-- SEM -->
  <rect x="380" y="340" width="310" height="60" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
  <text x="535" y="356" text-anchor="middle" font-size="8" font-weight="700" fill="#166534">SEM Architecture</text>
  <rect x="465" y="362" width="140" height="28" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="535" y="378" text-anchor="middle" font-size="8" font-weight="700" fill="#166534">Storage + Compute</text>
  <text x="535" y="389" text-anchor="middle" font-size="6.5" fill="#166534">(same resonator)</text>
  <text x="535" y="397" text-anchor="middle" font-size="6" fill="#16a34a">✓ Zero data movement</text>
</svg>