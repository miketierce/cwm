<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 410" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2563eb"/></marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#16a34a"/></marker>
  </defs>

  <rect width="720" height="410" fill="white" rx="4"/>
  <text x="360" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">Figure 6 · Fabrication Process Flow</text>

  <!-- Step 1 -->
  <rect x="30" y="50" width="150" height="80" rx="4" fill="#f8fafc" stroke="#d1d5db" stroke-width="0.8"/>
  <text x="105" y="65" text-anchor="middle" font-size="8" font-weight="700" fill="#374151">Step 1: Glass Wafer</text>
  <rect x="50" y="75" width="110" height="20" rx="2" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
  <text x="105" y="89" text-anchor="middle" font-size="7" fill="#1e40af">Borosilicate / Fused Silica</text>
  <text x="105" y="122" text-anchor="middle" font-size="6.5" fill="#6b7280">200 µm thick wafer</text>
  <text x="105" y="132" text-anchor="middle" font-size="6.5" fill="#6b7280">(Schott Borofloat 33)</text>

  <!-- Arrow -->
  <line x1="180" y1="90" x2="205" y2="90" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="210" y="50" width="150" height="80" rx="4" fill="#f8fafc" stroke="#d1d5db" stroke-width="0.8"/>
  <text x="285" y="65" text-anchor="middle" font-size="8" font-weight="700" fill="#374151">Step 2: DRIE Etch</text>
  <!-- Etched trenches -->
  <rect x="230" y="75" width="110" height="20" rx="2" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
  <!-- Trenches cut into glass -->
  <rect x="245" y="75" width="3" height="20" fill="white"/>
  <rect x="258" y="75" width="3" height="20" fill="white"/>
  <rect x="271" y="75" width="3" height="20" fill="white"/>
  <rect x="284" y="75" width="3" height="20" fill="white"/>
  <rect x="297" y="75" width="3" height="20" fill="white"/>
  <rect x="310" y="75" width="3" height="20" fill="white"/>
  <rect x="323" y="75" width="3" height="20" fill="white"/>
  <text x="285" y="122" text-anchor="middle" font-size="6.5" fill="#6b7280">SF₆/C₄F₈ fluorine DRIE</text>
  <text x="285" y="132" text-anchor="middle" font-size="6.5" fill="#6b7280">40 µm wide, 80 µm pitch</text>

  <!-- Arrow -->
  <line x1="360" y1="90" x2="385" y2="90" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="390" y="50" width="150" height="80" rx="4" fill="#f8fafc" stroke="#d1d5db" stroke-width="0.8"/>
  <text x="465" y="65" text-anchor="middle" font-size="8" font-weight="700" fill="#374151">Step 3: AlN Deposition</text>
  <rect x="410" y="75" width="110" height="20" rx="2" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
  <!-- AlN caps -->
  <rect x="410" y="72" width="8" height="3" fill="#fbbf24"/>
  <rect x="425" y="72" width="8" height="3" fill="#fbbf24"/>
  <rect x="440" y="72" width="8" height="3" fill="#fbbf24"/>
  <rect x="455" y="72" width="8" height="3" fill="#fbbf24"/>
  <rect x="470" y="72" width="8" height="3" fill="#fbbf24"/>
  <rect x="485" y="72" width="8" height="3" fill="#fbbf24"/>
  <rect x="500" y="72" width="8" height="3" fill="#fbbf24"/>
  <text x="465" y="122" text-anchor="middle" font-size="6.5" fill="#6b7280">Sputter AlN (0.5–1 µm)</text>
  <text x="465" y="132" text-anchor="middle" font-size="6.5" fill="#6b7280">+ Mo/Al electrodes</text>

  <!-- Arrow -->
  <line x1="540" y1="90" x2="565" y2="90" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="570" y="50" width="120" height="80" rx="4" fill="#f8fafc" stroke="#d1d5db" stroke-width="0.8"/>
  <text x="630" y="65" text-anchor="middle" font-size="8" font-weight="700" fill="#374151">Step 4: Perturbation</text>
  <rect x="585" y="75" width="90" height="20" rx="2" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
  <!-- Perturbation dots -->
  <circle cx="600" cy="74" r="2" fill="#ef4444"/>
  <circle cx="620" cy="74" r="1.5" fill="#ef4444"/>
  <circle cx="650" cy="74" r="2.5" fill="#ef4444"/>
  <text x="630" y="122" text-anchor="middle" font-size="6.5" fill="#6b7280">Metal dots (Au/Pt/W)</text>
  <text x="630" y="132" text-anchor="middle" font-size="6.5" fill="#6b7280">Lift-off lithography</text>

  <!-- Step 5 -->
  <rect x="30" y="165" width="200" height="85" rx="4" fill="#f8fafc" stroke="#d1d5db" stroke-width="0.8"/>
  <text x="130" y="180" text-anchor="middle" font-size="8" font-weight="700" fill="#374151">Step 5: Release + Vacuum Package</text>
  <!-- Released rods with tethers -->
  <rect x="50" y="195" width="160" height="6" rx="0" fill="#e5e7eb" stroke="#9ca3af" stroke-width="0.5"/>
  <!-- Individual released rods -->
  <rect x="60" y="191" width="25" height="4" rx="2" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.7"/>
  <rect x="90" y="191" width="25" height="4" rx="2" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.7"/>
  <rect x="120" y="191" width="25" height="4" rx="2" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.7"/>
  <rect x="150" y="191" width="25" height="4" rx="2" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.7"/>
  <rect x="180" y="191" width="25" height="4" rx="2" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.7"/>
  <!-- Tiny tethers -->
  <line x1="58" y1="193" x2="60" y2="193" stroke="#9ca3af" stroke-width="0.5"/>
  <line x1="85" y1="193" x2="90" y2="193" stroke="#9ca3af" stroke-width="0.5"/>
  <!-- Vacuum lid -->
  <rect x="50" y="185" width="160" height="3" rx="1" fill="#c4b5fd" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="130" y="183" text-anchor="middle" font-size="6" fill="#5b21b6">Vacuum lid (getter-sealed)</text>
  <text x="130" y="218" text-anchor="middle" font-size="6.5" fill="#6b7280">Etch release, leave tether anchors</text>
  <text x="130" y="228" text-anchor="middle" font-size="6.5" fill="#6b7280">Wafer-level vacuum seal (~1 Pa)</text>

  <!-- Arrow -->
  <line x1="230" y1="207" x2="265" y2="207" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 6 -->
  <rect x="270" y="165" width="200" height="85" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
  <text x="370" y="180" text-anchor="middle" font-size="8" font-weight="700" fill="#166534">Step 6: CMOS Integration</text>
  <!-- Glass array on top -->
  <rect x="295" y="195" width="150" height="12" rx="2" fill="#bfdbfe" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="370" y="203" text-anchor="middle" font-size="6" fill="#1e40af">Glass resonator array</text>
  <!-- Bumps -->
  <circle cx="315" cy="211" r="2" fill="#fbbf24"/>
  <circle cx="345" cy="211" r="2" fill="#fbbf24"/>
  <circle cx="375" cy="211" r="2" fill="#fbbf24"/>
  <circle cx="405" cy="211" r="2" fill="#fbbf24"/>
  <circle cx="435" cy="211" r="2" fill="#fbbf24"/>
  <!-- CMOS die -->
  <rect x="295" y="215" width="150" height="18" rx="2" fill="#f3f4f6" stroke="#9ca3af" stroke-width="0.8"/>
  <text x="370" y="227" text-anchor="middle" font-size="6.5" fill="#374151">CMOS readout die</text>
  <text x="370" y="242" text-anchor="middle" font-size="6.5" fill="#6b7280">Flip-chip bond (standard process)</text>

  <!-- ═══ BOTTOM: Manufacturing readiness ═══ -->
  <rect x="30" y="270" width="660" height="130" rx="6" fill="#f8fafc" stroke="#d1d5db" stroke-width="1"/>
  <text x="360" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Every Process Step Is Already in Production</text>

  <!-- Four columns -->
  <rect x="50" y="305" width="145" height="80" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="0.8"/>
  <text x="122" y="322" text-anchor="middle" font-size="8" font-weight="600" fill="#1e40af">Glass DRIE</text>
  <text x="122" y="338" text-anchor="middle" font-size="7" fill="#374151">Schott Borofloat 33</text>
  <text x="122" y="350" text-anchor="middle" font-size="7" fill="#374151">Microfluidics industry</text>
  <text x="122" y="365" text-anchor="middle" font-size="6.5" fill="#16a34a">✓ Production proven</text>

  <rect x="210" y="305" width="145" height="80" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="282" y="322" text-anchor="middle" font-size="8" font-weight="600" fill="#92400e">AlN Thin-Film Piezo</text>
  <text x="282" y="338" text-anchor="middle" font-size="7" fill="#374151">FBAR RF filters</text>
  <text x="282" y="350" text-anchor="middle" font-size="7" fill="#374151">Billions/yr in phones</text>
  <text x="282" y="365" text-anchor="middle" font-size="6.5" fill="#16a34a">✓ Production proven</text>

  <rect x="370" y="305" width="145" height="80" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="442" y="322" text-anchor="middle" font-size="8" font-weight="600" fill="#5b21b6">MEMS Packaging</text>
  <text x="442" y="338" text-anchor="middle" font-size="7" fill="#374151">SiTime, Abracon</text>
  <text x="442" y="350" text-anchor="middle" font-size="7" fill="#374151">Quartz oscillators</text>
  <text x="442" y="365" text-anchor="middle" font-size="6.5" fill="#16a34a">✓ Production proven</text>

  <rect x="530" y="305" width="145" height="80" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="0.8"/>
  <text x="602" y="322" text-anchor="middle" font-size="8" font-weight="600" fill="#166534">CMOS-MEMS Bond</text>
  <text x="602" y="338" text-anchor="middle" font-size="7" fill="#374151">Bosch, STMicro</text>
  <text x="602" y="350" text-anchor="middle" font-size="7" fill="#374151">Accelerometers, gyros</text>
  <text x="602" y="365" text-anchor="middle" font-size="6.5" fill="#16a34a">✓ Production proven</text>
</svg>