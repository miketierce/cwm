<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowR" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ef4444"/>
    </marker>
    <linearGradient id="rodG3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="50%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
  </defs>

  <rect width="720" height="360" fill="white" rx="4"/>
  <text x="360" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">Figure 3 · Eigenmode Encoding and Perturbation-Based Writing</text>

  <!-- ═══ LEFT: Mode shapes ═══ -->
  <text x="30" y="52" font-size="10" font-weight="700" fill="#1e40af">(a) Standing Wave Mode Shapes</text>

  <!-- Rod outline (background for all modes) -->
  <!-- Mode 1 -->
  <rect x="50" y="70" width="180" height="10" rx="5" fill="#f0f9ff" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="35" y="78" text-anchor="end" font-size="7" fill="#374151">n=1</text>
  <path d="M50,75 Q95,60 140,75 Q185,90 230,75" fill="none" stroke="#2563eb" stroke-width="1.5"/>

  <!-- Mode 2 -->
  <rect x="50" y="100" width="180" height="10" rx="5" fill="#f0f9ff" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="35" y="108" text-anchor="end" font-size="7" fill="#374151">n=2</text>
  <path d="M50,105 Q72,92 95,105 Q117,118 140,105 Q162,92 185,105 Q207,118 230,105" fill="none" stroke="#2563eb" stroke-width="1.5"/>

  <!-- Mode 3 -->
  <rect x="50" y="130" width="180" height="10" rx="5" fill="#f0f9ff" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="35" y="138" text-anchor="end" font-size="7" fill="#374151">n=3</text>
  <path d="M50,135 Q62,125 75,135 Q87,145 100,135 Q112,125 125,135 Q137,145 150,135 Q162,125 175,135 Q187,145 200,135 Q212,125 230,135" fill="none" stroke="#2563eb" stroke-width="1.5"/>

  <!-- Mode n -->
  <rect x="50" y="175" width="180" height="10" rx="5" fill="#f0f9ff" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="35" y="183" text-anchor="end" font-size="7" fill="#374151">n=N</text>
  <path d="M50,180 Q53,174 57,180 Q60,186 63,180 Q66,174 70,180 Q73,186 77,180 Q80,174 83,180 Q87,186 90,180 Q93,174 97,180 Q100,186 103,180 Q107,174 110,180 Q113,186 117,180 Q120,174 123,180 Q127,186 130,180 Q133,174 137,180 Q140,186 143,180 Q147,174 150,180 Q153,186 157,180 Q160,174 163,180 Q167,186 170,180 Q173,174 177,180 Q180,186 183,180 Q187,174 190,180 Q193,186 197,180 Q200,174 203,180 Q207,186 210,180 Q213,174 217,180 Q220,186 223,180 Q227,174 230,180" fill="none" stroke="#2563eb" stroke-width="1"/>

  <!-- Dots between mode 3 and N -->
  <text x="140" y="163" text-anchor="middle" font-size="12" fill="#9ca3af">⋮</text>

  <!-- Frequency labels -->
  <text x="240" y="78" font-size="7" fill="#1e40af">f₁ = v/2L</text>
  <text x="240" y="108" font-size="7" fill="#1e40af">f₂ = 2v/2L</text>
  <text x="240" y="138" font-size="7" fill="#1e40af">f₃ = 3v/2L</text>
  <text x="240" y="183" font-size="7" fill="#1e40af">fₙ = Nv/2L</text>

  <!-- Each mode = independent channel -->
  <rect x="50" y="200" width="180" height="20" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="0.8"/>
  <text x="140" y="214" text-anchor="middle" font-size="7" fill="#1e40af">Each mode = independent information channel</text>
  <text x="140" y="226" text-anchor="middle" font-size="7" fill="#1e40af">b = ½ log₂(1 + SNR) = 12.8 bits/mode</text>

  <!-- ═══ RIGHT: Perturbation effect ═══ -->
  <text x="360" y="52" font-size="10" font-weight="700" fill="#1e40af">(b) Perturbation Shifts Mode Frequencies</text>

  <!-- Before: clean spectrum -->
  <text x="370" y="73" font-size="8" font-weight="600" fill="#374151">Before (unperturbed):</text>
  <line x1="370" y1="130" x2="690" y2="130" stroke="#d1d5db" stroke-width="0.7"/>

  <!-- Clean peaks -->
  <line x1="400" y1="130" x2="400" y2="80" stroke="#2563eb" stroke-width="2.5" opacity="0.8"/>
  <line x1="440" y1="130" x2="440" y2="88" stroke="#2563eb" stroke-width="2.5" opacity="0.8"/>
  <line x1="480" y1="130" x2="480" y2="82" stroke="#2563eb" stroke-width="2.5" opacity="0.8"/>
  <line x1="520" y1="130" x2="520" y2="92" stroke="#2563eb" stroke-width="2.5" opacity="0.8"/>
  <line x1="560" y1="130" x2="560" y2="85" stroke="#2563eb" stroke-width="2.5" opacity="0.8"/>
  <line x1="600" y1="130" x2="600" y2="95" stroke="#2563eb" stroke-width="2.5" opacity="0.8"/>
  <line x1="640" y1="130" x2="640" y2="90" stroke="#2563eb" stroke-width="2.5" opacity="0.8"/>
  <line x1="680" y1="130" x2="680" y2="98" stroke="#2563eb" stroke-width="2.5" opacity="0.8"/>

  <!-- Frequency axis label -->
  <text x="690" y="142" text-anchor="end" font-size="6.5" fill="#6b7280">f →</text>

  <!-- Add perturbation illustration -->
  <text x="370" y="168" font-size="8" font-weight="600" fill="#374151">After (mass added at position x):</text>

  <!-- Rod with perturbation -->
  <rect x="480" y="156" width="80" height="6" rx="3" fill="url(#rodG3)" stroke="#3b82f6" stroke-width="0.7"/>
  <circle cx="510" cy="155" r="4" fill="#ef4444" stroke="#b91c1c" stroke-width="0.5"/>
  <text x="510" y="150" text-anchor="middle" font-size="5.5" fill="#dc2626">Δm</text>

  <line x1="370" y1="230" x2="690" y2="230" stroke="#d1d5db" stroke-width="0.7"/>

  <!-- Shifted peaks — each shifts by different amount -->
  <!-- Original (ghost) -->
  <line x1="400" y1="230" x2="400" y2="180" stroke="#2563eb" stroke-width="1.5" opacity="0.2"/>
  <line x1="440" y1="230" x2="440" y2="188" stroke="#2563eb" stroke-width="1.5" opacity="0.2"/>
  <line x1="480" y1="230" x2="480" y2="182" stroke="#2563eb" stroke-width="1.5" opacity="0.2"/>
  <line x1="520" y1="230" x2="520" y2="192" stroke="#2563eb" stroke-width="1.5" opacity="0.2"/>
  <line x1="560" y1="230" x2="560" y2="185" stroke="#2563eb" stroke-width="1.5" opacity="0.2"/>
  <line x1="600" y1="230" x2="600" y2="195" stroke="#2563eb" stroke-width="1.5" opacity="0.2"/>
  <line x1="640" y1="230" x2="640" y2="190" stroke="#2563eb" stroke-width="1.5" opacity="0.2"/>
  <line x1="680" y1="230" x2="680" y2="198" stroke="#2563eb" stroke-width="1.5" opacity="0.2"/>

  <!-- New positions (shifted) -->
  <line x1="397" y1="230" x2="397" y2="180" stroke="#ef4444" stroke-width="2.5" opacity="0.8"/>
  <line x1="435" y1="230" x2="435" y2="188" stroke="#ef4444" stroke-width="2.5" opacity="0.8"/>
  <line x1="478" y1="230" x2="478" y2="182" stroke="#ef4444" stroke-width="2.5" opacity="0.8"/>
  <line x1="522" y1="230" x2="522" y2="192" stroke="#ef4444" stroke-width="2.5" opacity="0.8"/>
  <line x1="554" y1="230" x2="554" y2="185" stroke="#ef4444" stroke-width="2.5" opacity="0.8"/>
  <line x1="598" y1="230" x2="598" y2="195" stroke="#ef4444" stroke-width="2.5" opacity="0.8"/>
  <line x1="644" y1="230" x2="644" y2="190" stroke="#ef4444" stroke-width="2.5" opacity="0.8"/>
  <line x1="676" y1="230" x2="676" y2="198" stroke="#ef4444" stroke-width="2.5" opacity="0.8"/>

  <!-- Shift arrows on a couple peaks -->
  <path d="M400,178 L397,178" stroke="#ef4444" stroke-width="0.8" marker-end="url(#arrowR)"/>
  <path d="M440,186 L435,186" stroke="#ef4444" stroke-width="0.8" marker-end="url(#arrowR)"/>

  <!-- Rayleigh formula annotation -->
  <text x="690" y="242" text-anchor="end" font-size="6.5" fill="#6b7280">f →</text>

  <!-- Shift annotations -->
  <text x="398" y="175" text-anchor="middle" font-size="5.5" fill="#dc2626">Δf₁</text>
  <text x="436" y="183" text-anchor="middle" font-size="5.5" fill="#dc2626">Δf₂</text>

  <!-- Legend -->
  <rect x="370" y="245" width="320" height="32" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.8"/>
  <line x1="385" y1="256" x2="400" y2="256" stroke="#2563eb" stroke-width="2" opacity="0.3"/>
  <text x="405" y="259" font-size="7" fill="#374151">Original spectrum</text>
  <line x1="490" y1="256" x2="505" y2="256" stroke="#ef4444" stroke-width="2.5"/>
  <text x="510" y="259" font-size="7" fill="#374151">After perturbation</text>
  <text x="530" y="271" text-anchor="middle" font-size="7" fill="#991b1b">Δfₙ/fₙ = −(Δm/2M) sin²(nπx/L) — unique fingerprint per perturbation pattern</text>

  <!-- ═══ BOTTOM: Key Point ═══ -->
  <rect x="30" y="295" width="660" height="55" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
  <text x="360" y="315" text-anchor="middle" font-size="9" font-weight="700" fill="#166534">ENCODING PRINCIPLE</text>
  <text x="360" y="332" text-anchor="middle" font-size="8" fill="#374151">One physical perturbation creates a unique pattern of frequency shifts across ALL 9,380 modes simultaneously.</text>
  <text x="360" y="345" text-anchor="middle" font-size="8" fill="#374151">Multiple perturbations superpose → high-dimensional spectral fingerprint = stored data pattern.</text>
</svg>