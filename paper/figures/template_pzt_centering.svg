  <!-- Legend -->
  <g transform="translate(72, 540)">
    <text x="0" y="0" class="label" font-weight="700">Legend</text>
    <!-- PZT disc -->
    <circle cx="12" cy="18" r="8" fill="none" stroke="#888" stroke-width="1.0" stroke-dasharray="3,2"/>
    <text x="28" y="22" class="label">Grey dashed circle = 10 mm PZT disc outline (cut here)</text>
    <!-- Rod end -->
    <circle cx="12" cy="40" r="8" fill="none" stroke="#2a7fff" stroke-width="1.2"/>
    <text x="28" y="44" class="label">Blue circle = 6 mm rod end (your rod sits inside this ring)</text>
    <!-- Crosshair -->
    <line x1="4" y1="60" x2="20" y2="60" stroke="#c00" stroke-width="0.5"/>
    <line x1="12" y1="52" x2="12" y2="68" stroke="#c00" stroke-width="0.5"/>
    <circle cx="12" cy="60" r="1.417" fill="#c00" stroke="none"/>
    <text x="28" y="64" class="label">Red crosshair + dot = exact center — place your glue drop here</text>
  </g>

  <!-- Instructions -->
  <g transform="translate(72, 615)">
    <text x="0" y="0" class="step-bold">How to use:</text>
    <text x="0" y="18" class="step">1. Print this page at 100% scale. Verify the 50 mm ruler above with a physical ruler.</text>
    <text x="0" y="34" class="step">2. Cut out one centering guide along the grey dashed circle.</text>
    <text x="0" y="50" class="step">3. Place the paper disc on the flat end of your glass rod, aligning the blue circle</text>
    <text x="14" y="64" class="step">with the rod's edge. The red dot marks the exact center of the 6 mm face.</text>
    <text x="0" y="82" class="step">4. Place one tiny drop of cyanoacrylate (&lt;0.5 mm) on the red center dot.</text>
    <text x="0" y="98" class="step">5. Remove the paper guide. Press the PZT disc onto the rod end, centering the</text>
    <text x="14" y="112" class="step">disc so the rod end (6 mm) sits in the middle of the PZT disc (10 mm).</text>
    <text x="14" y="126" class="step">There should be 2 mm of PZT overhang uniformly around the rod.</text>
    <text x="0" y="144" class="step">6. Hold firm pressure for 30 seconds. Cure 24 hours before use.</text>
  </g>

  <!-- Dimensions callout -->
  <g transform="translate(72, 770)">
    <text x="0" y="0" class="note">PZT disc: 10 mm dia (E-outstanding B08R581G3H or uxcell B07RK2V1P2) · Rod: 6 mm dia × 150 mm borosilicate (PATIKIL B0F93VD85L) · 12 guides per sheet</text>
