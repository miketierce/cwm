<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .title { font-size: 13px; font-weight: 600; fill: #1a1a2e; }
      .label { font-size: 10px; fill: #444; }
      .label-bold { font-size: 10px; fill: #1a1a2e; font-weight: 600; }
      .axis-label { font-size: 9px; fill: #666; }
      .annotation { font-size: 11px; fill: #0d7377; font-weight: 600; }
      .annotation-red { font-size: 11px; fill: #c0392b; font-weight: 600; }
      .grid-line { stroke: #e8e8e8; stroke-width: 0.5; }
      .axis-line { stroke: #333; stroke-width: 1; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="720" height="380" fill="#fafafa" rx="4"/>

  <!-- ═══ LEFT PANEL: Ring-down Waveform ═══ -->
  <text x="195" y="22" text-anchor="middle" class="title">(a) Ring-down Trace: Fundamental Mode (17.7 kHz)</text>

  <!-- Plot area: x=55..355, y=35..230 -->
  <line x1="55" y1="230" x2="355" y2="230" class="axis-line"/>
  <line x1="55" y1="35" x2="55" y2="230" class="axis-line"/>

  <!-- Y-axis -->
  <text x="20" y="133" text-anchor="middle" class="label-bold" transform="rotate(-90,20,133)">Displacement (nm)</text>
  <text x="205" y="250" text-anchor="middle" class="label">Time (ms)</text>

  <!-- Grid lines -->
  <line x1="55" y1="84" x2="355" y2="84" class="grid-line"/>
  <line x1="55" y1="133" x2="355" y2="133" class="grid-line"/>
  <line x1="55" y1="181" x2="355" y2="181" class="grid-line"/>

  <!-- Y-axis ticks -->
  <text x="50" y="38" text-anchor="end" class="axis-label">+1.0</text>
  <text x="50" y="86" text-anchor="end" class="axis-label">+0.5</text>
  <text x="50" y="136" text-anchor="end" class="axis-label">0</text>
  <text x="50" y="184" text-anchor="end" class="axis-label">−0.5</text>
  <text x="50" y="233" text-anchor="end" class="axis-label">−1.0</text>

  <!-- X-axis ticks -->
  <text x="55" y="262" text-anchor="middle" class="axis-label">0</text>
  <text x="115" y="262" text-anchor="middle" class="axis-label">20</text>
  <text x="175" y="262" text-anchor="middle" class="axis-label">40</text>
  <text x="235" y="262" text-anchor="middle" class="axis-label">60</text>
  <text x="295" y="262" text-anchor="middle" class="axis-label">80</text>
  <text x="355" y="262" text-anchor="middle" class="axis-label">100</text>

  <!-- Exponential decay envelope (upper) — τ = Q/(πf₁) ≈ 10000/(π×18800) ≈ 169 ms -->
  <!-- Plotting A(t) = exp(-t/τ) from t=0 to 100ms; τ≈169ms -->
  <!-- At t=0: A=1.0→y=35; t=20: A=0.888→y=48; t=40: 0.789→y=61; t=60: 0.700→y=68; t=80: 0.622→y=78; t=100: 0.553→y=87 -->
  <!-- Upper envelope (positive) -->
  <path d="M55,35 Q60,36 75,40 Q95,44 115,48 Q135,52 155,55 Q175,58 195,61 Q215,64 235,68 Q255,72 275,74 Q295,77 315,80 Q335,82 355,84"
        fill="none" stroke="#0d7377" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- Lower envelope (negative) -->
  <path d="M55,231 Q60,230 75,226 Q95,222 115,218 Q135,214 155,211 Q175,208 195,205 Q215,202 235,198 Q255,194 275,192 Q295,189 315,186 Q335,184 355,182"
        fill="none" stroke="#0d7377" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Oscillating waveform inside envelope — dense sinusoid, simplified -->
  <!-- At 17.7 kHz, 100 ms = 1770 cycles. We'll represent this as a dense zigzag -->
  <path d="M55,35 L57,220 L59,38 L61,218 L63,40 L65,216 L67,42 L69,214 L71,44 L73,213 L75,46 L77,211 L79,48 L81,209 L83,50 L85,208 L87,52 L89,206 L91,54 L93,204 L95,55 L97,203 L99,57 L101,201 L103,58 L105,200 L107,60 L109,198 L111,61 L113,197 L115,63 L117,196 L119,64 L121,195 L123,65 L125,194 L127,66 L129,193 L131,67 L133,192 L135,68 L137,191 L139,69 L141,190 L143,70 L145,189 L147,71 L149,188 L151,72 L153,187 L155,73 L157,187 L159,74 L161,186 L163,75 L165,185 L167,76 L169,185 L171,77 L173,184 L175,77 L177,183 L179,78 L181,183 L183,79 L185,182 L187,80 L189,182 L191,80 L193,181 L195,81 L197,181 L199,82 L201,180 L203,82 L205,180 L207,83 L209,179 L211,83 L213,179 L215,84 L217,179 L219,84 L221,178 L223,85 L225,178 L227,85 L229,177 L231,86 L233,177 L235,86 L237,177 L239,87 L241,176 L243,87 L245,176 L247,88 L249,176 L251,88 L253,175 L255,88 L257,175 L259,89 L261,175 L263,89 L265,174 L267,89 L269,174 L271,90 L273,174 L275,90 L277,173 L279,90 L281,173 L283,91 L285,173 L287,91 L289,173 L291,91 L293,172 L295,92 L297,172 L299,92 L301,172 L303,92 L305,172 L307,93 L309,171 L311,93 L313,171 L315,93 L317,171 L319,93 L321,171 L323,94 L325,170 L327,94 L329,170 L331,94 L333,170 L335,94 L337,170 L339,95 L341,170 L343,95 L345,170 L347,95 L349,169 L351,95 L353,169 L355,96"
        fill="none" stroke="#2980b9" stroke-width="0.8" opacity="0.7"/>

  <!-- tau annotation -->
  <line x1="55" y1="94" x2="55" y2="94" stroke="#0d7377" stroke-width="0"/>
  <!-- 1/e point: at t = τ = 169 ms → off chart. At t=50 ms, A ≈ 0.744 → y ≈ 133-(0.744*98)=60 -->
  <!-- Mark 1/e level: A = 0.368 → y = 133 - 0.368*98 = 97 at t = 169 ms (off chart) -->
  <!-- Instead mark the visible decay and annotate Q -->
  <text x="260" y="68" class="annotation">τ = Q/(πf₁)</text>
  <text x="260" y="82" class="annotation" font-size="9">= 10,000/(π × 18,800)</text>
  <text x="260" y="96" class="annotation" font-size="9">= 169 ms</text>

  <!-- Envelope label -->
  <text x="88" y="33" class="label" font-size="9" fill="#0d7377">e⁻ᵗ/τ envelope</text>

  <!-- ═══ RIGHT PANEL: Q Measurement Method ═══ -->
  <line x1="375" y1="18" x2="375" y2="290" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="545" y="22" text-anchor="middle" class="title">(b) Q Extraction: Bandwidth Method</text>

  <!-- Plot area: x=410..695, y=35..230 -->
  <line x1="410" y1="230" x2="695" y2="230" class="axis-line"/>
  <line x1="410" y1="35" x2="410" y2="230" class="axis-line"/>

  <!-- Y-axis -->
  <text x="386" y="133" text-anchor="middle" class="label-bold" transform="rotate(-90,386,133)">|H(f)| (dB)</text>
  <text x="553" y="250" text-anchor="middle" class="label">Frequency − f₁ (Hz)</text>

  <!-- Grid -->
  <line x1="410" y1="68" x2="695" y2="68" class="grid-line"/>
  <line x1="410" y1="101" x2="695" y2="101" class="grid-line"/>
  <line x1="410" y1="133" x2="695" y2="133" class="grid-line"/>
  <line x1="410" y1="166" x2="695" y2="166" class="grid-line"/>
  <line x1="410" y1="198" x2="695" y2="198" class="grid-line"/>

  <!-- Y-axis ticks -->
  <text x="405" y="38" text-anchor="end" class="axis-label">0</text>
  <text x="405" y="71" text-anchor="end" class="axis-label">−6</text>
  <text x="405" y="104" text-anchor="end" class="axis-label">−12</text>
  <text x="405" y="136" text-anchor="end" class="axis-label">−18</text>
  <text x="405" y="169" text-anchor="end" class="axis-label">−24</text>
  <text x="405" y="201" text-anchor="end" class="axis-label">−30</text>

  <!-- X-axis ticks -->
  <text x="410" y="262" text-anchor="middle" class="axis-label">−4</text>
  <text x="457" y="262" text-anchor="middle" class="axis-label">−3</text>
  <text x="505" y="262" text-anchor="middle" class="axis-label">−2</text>
  <text x="553" y="262" text-anchor="middle" class="axis-label">0</text>
  <text x="600" y="262" text-anchor="middle" class="axis-label">+2</text>
  <text x="648" y="262" text-anchor="middle" class="axis-label">+3</text>
  <text x="695" y="262" text-anchor="middle" class="axis-label">+4</text>

  <!-- Lorentzian resonance peak -->
  <path d="M410,215 Q425,210 440,204 Q455,195 470,183 Q480,172 490,158 Q500,140 510,115 Q520,88 530,62 Q540,44 553,35 Q565,44 575,62 Q585,88 595,115 Q605,140 615,158 Q625,172 635,183 Q650,195 665,204 Q680,210 695,215"
        fill="none" stroke="#2980b9" stroke-width="2.5"/>

  <!-- Fill under curve (subtle) -->
  <path d="M410,215 Q425,210 440,204 Q455,195 470,183 Q480,172 490,158 Q500,140 510,115 Q520,88 530,62 Q540,44 553,35 Q565,44 575,62 Q585,88 595,115 Q605,140 615,158 Q625,172 635,183 Q650,195 665,204 Q680,210 695,215 L695,230 L410,230 Z"
        fill="#2980b9" opacity="0.08"/>

  <!-- -3 dB line -->
  <line x1="410" y1="51" x2="695" y2="51" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="698" y="54" class="axis-label" fill="#c0392b">−3 dB</text>

  <!-- -3 dB width markers -->
  <!-- At -3dB: roughly at ±0.94 Hz for Q=10,000 at f=18,800 Hz → Δf₃dB = f/Q = 1.88 Hz -->
  <!-- In plot coordinates: center at x=553, width of ~1.88 Hz in scale where 4 Hz = 143 px → 1 Hz = 35.75 px -->
  <!-- So ±0.94 Hz = ±33.6 px → x = 519.4 and 586.6 -->
  <line x1="520" y1="47" x2="520" y2="55" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="586" y1="47" x2="586" y2="55" stroke="#c0392b" stroke-width="1.5"/>

  <!-- Width bracket -->
  <line x1="520" y1="61" x2="586" y2="61" stroke="#c0392b" stroke-width="1"/>
  <path d="M520,58 L520,64" stroke="#c0392b" stroke-width="1"/>
  <path d="M586,58 L586,64" stroke="#c0392b" stroke-width="1"/>
  <text x="553" y="75" text-anchor="middle" class="annotation-red" font-size="10">Δf₃dB = 1.88 Hz</text>

  <!-- Q annotation -->
  <rect x="480" y="100" width="146" height="52" rx="4" fill="white" stroke="#0d7377" stroke-width="1"/>
  <text x="553" y="118" text-anchor="middle" class="annotation" font-size="12">Q = f₁ / Δf₃dB</text>
  <text x="553" y="136" text-anchor="middle" class="annotation" font-size="12">= 18,800 / 1.88</text>
  <text x="553" y="148" text-anchor="middle" class="annotation" font-size="13" font-weight="700">= 10,000</text>

  <!-- Peak label -->
  <text x="553" y="195" text-anchor="middle" class="label-bold">f₁ = 18,800 Hz</text>

  <!-- Bottom summary -->
  <rect x="50" y="290" width="620" height="75" rx="6" fill="#f0f7f7" stroke="#0d7377" stroke-width="0.8"/>
  <text x="360" y="310" text-anchor="middle" class="label-bold" font-size="11">Ring-down confirms Q ≥ 10,000 in macro prototype</text>
  <text x="360" y="328" text-anchor="middle" class="label" font-size="10">The exponential decay envelope gives τ = 169 ms, consistent with Q = πf₁τ = 10,000.</text>
  <text x="360" y="346" text-anchor="middle" class="label" font-size="10">The bandwidth method independently confirms Q via the −3 dB linewidth of the resonance peak.</text>
  <text x="360" y="358" text-anchor="middle" class="label" font-size="10">Both methods agree: the borosilicate prototype is material-loss limited, not electronics-limited.</text>
</svg>
