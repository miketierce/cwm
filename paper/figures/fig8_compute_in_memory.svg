<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .title { font-size: 13px; font-weight: 600; fill: #1a1a2e; }
      .label { font-size: 10px; fill: #444; }
      .label-bold { font-size: 10.5px; fill: #1a1a2e; font-weight: 600; }
      .axis-label { font-size: 9px; fill: #666; }
      .annotation { font-size: 11px; font-weight: 600; }
      .result-good { font-size: 11px; fill: #0d7377; font-weight: 600; }
      .result-num { font-size: 18px; fill: #0d7377; font-weight: 700; }
    </style>
  </defs>

  <rect width="720" height="360" fill="#fafafa" rx="4"/>

  <!-- ═══ TOP: Superposition Principle ═══ -->
  <text x="360" y="22" text-anchor="middle" class="title">In-Situ Boolean Computation via Mode Superposition</text>

  <!-- Pattern A bars -->
  <text x="60" y="48" text-anchor="middle" class="label-bold">Pattern A</text>
  <g transform="translate(15, 52)">
    <!-- 8 mode amplitude bars for A: 1=high, 0=low -->
    <rect x="0" y="25" width="10" height="15" rx="1" fill="#2980b9"/><!-- low -->
    <rect x="12" y="5" width="10" height="35" rx="1" fill="#2980b9"/><!-- high -->
    <rect x="24" y="5" width="10" height="35" rx="1" fill="#2980b9"/><!-- high -->
    <rect x="36" y="25" width="10" height="15" rx="1" fill="#2980b9"/><!-- low -->
    <rect x="48" y="5" width="10" height="35" rx="1" fill="#2980b9"/><!-- high -->
    <rect x="60" y="25" width="10" height="15" rx="1" fill="#2980b9"/><!-- low -->
    <rect x="72" y="5" width="10" height="35" rx="1" fill="#2980b9"/><!-- high -->
    <rect x="84" y="5" width="10" height="35" rx="1" fill="#2980b9"/><!-- high -->
    <line x1="0" y1="40" x2="94" y2="40" stroke="#999" stroke-width="0.5"/>
    <text x="47" y="55" text-anchor="middle" class="axis-label">0 1 1 0 1 0 1 1</text>
  </g>

  <!-- Plus sign -->
  <text x="122" y="78" text-anchor="middle" style="font-size:20px; fill:#666;">+</text>

  <!-- Pattern B bars -->
  <text x="185" y="48" text-anchor="middle" class="label-bold">Pattern B</text>
  <g transform="translate(140, 52)">
    <rect x="0" y="5" width="10" height="35" rx="1" fill="#e67e22"/><!-- high -->
    <rect x="12" y="5" width="10" height="35" rx="1" fill="#e67e22"/><!-- high -->
    <rect x="24" y="25" width="10" height="15" rx="1" fill="#e67e22"/><!-- low -->
    <rect x="36" y="25" width="10" height="15" rx="1" fill="#e67e22"/><!-- low -->
    <rect x="48" y="5" width="10" height="35" rx="1" fill="#e67e22"/><!-- high -->
    <rect x="60" y="5" width="10" height="35" rx="1" fill="#e67e22"/><!-- high -->
    <rect x="72" y="25" width="10" height="15" rx="1" fill="#e67e22"/><!-- low -->
    <rect x="84" y="5" width="10" height="35" rx="1" fill="#e67e22"/><!-- high -->
    <line x1="0" y1="40" x2="94" y2="40" stroke="#999" stroke-width="0.5"/>
    <text x="47" y="55" text-anchor="middle" class="axis-label">1 1 0 0 1 1 0 1</text>
  </g>

  <!-- Equals sign -->
  <text x="247" y="78" text-anchor="middle" style="font-size:20px; fill:#666;">=</text>

  <!-- Superposition A+B bars (taller where both high) -->
  <text x="330" y="48" text-anchor="middle" class="label-bold">Superposition A + B</text>
  <g transform="translate(265, 52)">
    <!-- Heights: 0+1=med, 1+1=tall, 1+0=med, 0+0=short, 1+1=tall, 0+1=med, 1+0=med, 1+1=tall -->
    <rect x="0" y="15" width="14" height="25" rx="1" fill="#8e44ad" opacity="0.7"/>
    <rect x="16" y="0" width="14" height="40" rx="1" fill="#8e44ad"/>
    <rect x="32" y="15" width="14" height="25" rx="1" fill="#8e44ad" opacity="0.7"/>
    <rect x="48" y="30" width="14" height="10" rx="1" fill="#8e44ad" opacity="0.4"/>
    <rect x="64" y="0" width="14" height="40" rx="1" fill="#8e44ad"/>
    <rect x="80" y="15" width="14" height="25" rx="1" fill="#8e44ad" opacity="0.7"/>
    <rect x="96" y="15" width="14" height="25" rx="1" fill="#8e44ad" opacity="0.7"/>
    <rect x="112" y="0" width="14" height="40" rx="1" fill="#8e44ad"/>
    <line x1="0" y1="40" x2="126" y2="40" stroke="#999" stroke-width="0.5"/>
  </g>

  <!-- Threshold regions -->
  <g transform="translate(265, 52)">
    <!-- AND threshold (high) -->
    <line x1="-5" y1="8" x2="131" y2="8" stroke="#27ae60" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="136" y="12" class="axis-label" fill="#27ae60">AND threshold</text>

    <!-- XOR band -->
    <line x1="-5" y1="22" x2="131" y2="22" stroke="#2980b9" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="136" y="26" class="axis-label" fill="#2980b9">XOR band</text>

    <!-- OR threshold (low) -->
    <line x1="-5" y1="33" x2="131" y2="33" stroke="#e67e22" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="136" y="37" class="axis-label" fill="#e67e22">OR threshold</text>
  </g>

  <!-- ═══ MIDDLE: Truth table arrows ═══ -->
  <line x1="330" y1="116" x2="330" y2="140" stroke="#666" stroke-width="1.5" marker-end="url(#arrowD)"/>
  <defs><marker id="arrowD" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><polygon points="0,0 6,2 0,4" fill="#666"/></marker></defs>
  <text x="340" y="132" class="label" fill="#666">Threshold decode</text>

  <!-- ═══ BOTTOM LEFT: Truth table ═══ -->
  <text x="140" y="160" text-anchor="middle" class="label-bold">Decoded Boolean Results</text>

  <!-- Table -->
  <g transform="translate(20, 170)">
    <!-- Header -->
    <rect x="0" y="0" width="280" height="22" rx="2" fill="#2c3e50" opacity="0.1"/>
    <text x="18" y="15" class="label-bold">Mode</text>
    <text x="58" y="15" class="label-bold">A</text>
    <text x="88" y="15" class="label-bold">B</text>
    <text x="118" y="15" class="label-bold">A+B</text>
    <text x="160" y="15" class="label-bold" fill="#2980b9">XOR</text>
    <text x="200" y="15" class="label-bold" fill="#27ae60">AND</text>
    <text x="240" y="15" class="label-bold" fill="#e67e22">OR</text>

    <!-- Row 1 -->
    <text x="18" y="37" class="axis-label">f₁</text>
    <text x="58" y="37" class="axis-label">0</text>
    <text x="88" y="37" class="axis-label">1</text>
    <text x="122" y="37" class="axis-label">med</text>
    <text x="164" y="37" class="axis-label" fill="#2980b9" font-weight="600">1</text>
    <text x="204" y="37" class="axis-label" fill="#27ae60">0</text>
    <text x="244" y="37" class="axis-label" fill="#e67e22" font-weight="600">1</text>

    <!-- Row 2 -->
    <rect x="0" y="42" width="280" height="18" rx="1" fill="#f8f8f8"/>
    <text x="18" y="55" class="axis-label">f₂</text>
    <text x="58" y="55" class="axis-label">1</text>
    <text x="88" y="55" class="axis-label">1</text>
    <text x="122" y="55" class="axis-label">high</text>
    <text x="164" y="55" class="axis-label" fill="#2980b9">0</text>
    <text x="204" y="55" class="axis-label" fill="#27ae60" font-weight="600">1</text>
    <text x="244" y="55" class="axis-label" fill="#e67e22" font-weight="600">1</text>

    <!-- Row 3 -->
    <text x="18" y="73" class="axis-label">f₃</text>
    <text x="58" y="73" class="axis-label">1</text>
    <text x="88" y="73" class="axis-label">0</text>
    <text x="122" y="73" class="axis-label">med</text>
    <text x="164" y="73" class="axis-label" fill="#2980b9" font-weight="600">1</text>
    <text x="204" y="73" class="axis-label" fill="#27ae60">0</text>
    <text x="244" y="73" class="axis-label" fill="#e67e22" font-weight="600">1</text>

    <!-- Row 4 -->
    <rect x="0" y="78" width="280" height="18" rx="1" fill="#f8f8f8"/>
    <text x="18" y="91" class="axis-label">f₄</text>
    <text x="58" y="91" class="axis-label">0</text>
    <text x="88" y="91" class="axis-label">0</text>
    <text x="122" y="91" class="axis-label">low</text>
    <text x="164" y="91" class="axis-label" fill="#2980b9">0</text>
    <text x="204" y="91" class="axis-label" fill="#27ae60">0</text>
    <text x="244" y="91" class="axis-label" fill="#e67e22">0</text>

    <line x1="0" y1="100" x2="280" y2="100" stroke="#ddd" stroke-width="0.5"/>
    <text x="140" y="115" text-anchor="middle" class="axis-label" font-style="italic">1 read cycle decodes all 3 operations simultaneously</text>
  </g>

  <!-- ═══ BOTTOM RIGHT: Results Box ═══ -->
  <rect x="380" y="148" width="320" height="190" rx="8" fill="white" stroke="#0d7377" stroke-width="1.5"/>
  <rect x="380" y="148" width="320" height="30" rx="8" fill="#0d7377" opacity="0.1"/>
  <text x="540" y="168" text-anchor="middle" class="label-bold" fill="#0d7377">Simulation Results (32 modes)</text>

  <!-- XOR -->
  <g transform="translate(400, 190)">
    <rect x="0" y="0" width="70" height="50" rx="6" fill="#2980b9" opacity="0.1" stroke="#2980b9" stroke-width="1"/>
    <text x="35" y="18" text-anchor="middle" class="label-bold" fill="#2980b9">XOR</text>
    <text x="35" y="42" text-anchor="middle" class="result-num" fill="#2980b9">90.6%</text>
  </g>

  <!-- AND -->
  <g transform="translate(490, 190)">
    <rect x="0" y="0" width="70" height="50" rx="6" fill="#27ae60" opacity="0.1" stroke="#27ae60" stroke-width="1"/>
    <text x="35" y="18" text-anchor="middle" class="label-bold" fill="#27ae60">AND</text>
    <text x="35" y="42" text-anchor="middle" class="result-num" fill="#27ae60">96.9%</text>
  </g>

  <!-- OR -->
  <g transform="translate(580, 190)">
    <rect x="0" y="0" width="70" height="50" rx="6" fill="#e67e22" opacity="0.1" stroke="#e67e22" stroke-width="1"/>
    <text x="35" y="18" text-anchor="middle" class="label-bold" fill="#e67e22">OR</text>
    <text x="35" y="42" text-anchor="middle" class="result-num" fill="#e67e22">93.8%</text>
  </g>

  <!-- Speedup -->
  <g transform="translate(400, 258)">
    <rect x="0" y="0" width="280" height="55" rx="6" fill="#8e44ad" opacity="0.08" stroke="#8e44ad" stroke-width="1"/>
    <text x="140" y="20" text-anchor="middle" class="label-bold" fill="#8e44ad">Speedup vs. Separate Read Cycles</text>
    <text x="140" y="45" text-anchor="middle" style="font-size:22px; fill:#8e44ad; font-weight:700;">3× faster</text>
  </g>

  <!-- Bottom annotation -->
  <text x="540" y="328" text-anchor="middle" class="label" font-style="italic" fill="#555">One superposition readout replaces three separate</text>
  <text x="540" y="340" text-anchor="middle" class="label" font-style="italic" fill="#555">read-compute-write cycles — the physics is the processor.</text>
</svg>