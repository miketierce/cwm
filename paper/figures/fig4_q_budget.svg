<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="720" height="320" fill="white" rx="4"/>
  <text x="360" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">Figure 4 · Q-Factor Loss Budget — Why MEMS Geometry Preserves the Physics</text>

  <!-- ═══ LEFT: PIE-STYLE BAR CHART ═══ -->
  <text x="30" y="52" font-size="10" font-weight="700" fill="#1e40af">(a) 1 mm Borosilicate — Loss Budget</text>

  <!-- Stacked horizontal bar -->
  <rect x="50" y="70" width="265" height="40" rx="4" fill="#3b82f6"/>
  <!-- Material: 91.1% = 241px -->
  <rect x="50" y="70" width="241" height="40" rx="4" fill="#ef4444"/>
  <text x="170" y="93" text-anchor="middle" font-size="10" font-weight="700" fill="white">Material Intrinsic: 91.1%</text>

  <!-- Surface: 4.6% = 12px -->
  <rect x="291" y="70" width="12" height="40" rx="0" fill="#f59e0b"/>
  <!-- Anchor: 4.2% = 11px -->
  <rect x="303" y="70" width="12" height="40" rx="0" fill="#8b5cf6"/>

  <!-- TED + Gas: ~0% -->

  <!-- Labels with lines -->
  <line x1="297" y1="110" x2="297" y2="135" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="297" y="148" text-anchor="middle" font-size="7" fill="#92400e">Surface</text>
  <text x="297" y="158" text-anchor="middle" font-size="7" fill="#92400e">4.6%</text>

  <line x1="309" y1="110" x2="335" y2="130" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="348" y="133" font-size="7" fill="#5b21b6">Anchor 4.2%</text>

  <text x="340" y="90" font-size="6" fill="#3b82f6">TED + Gas ≈ 0%</text>

  <!-- Q values table -->
  <text x="50" y="185" font-size="8" font-weight="600" fill="#374151">Component Q values:</text>

  <rect x="50" y="192" width="130" height="16" rx="2" fill="#fef2f2"/>
  <text x="55" y="204" font-size="7" fill="#991b1b">Q_material = 10,000</text>
  <rect x="50" y="208" width="130" height="16" rx="2" fill="#fff7ed"/>
  <text x="55" y="220" font-size="7" fill="#92400e">Q_surface = 196,000</text>
  <rect x="50" y="224" width="130" height="16" rx="2" fill="#f5f3ff"/>
  <text x="55" y="236" font-size="7" fill="#5b21b6">Q_anchor = 216,000</text>
  <rect x="50" y="240" width="130" height="16" rx="2" fill="#f0f9ff"/>
  <text x="55" y="252" font-size="7" fill="#1e40af">Q_TED = 40,900,000</text>
  <rect x="50" y="256" width="130" height="16" rx="2" fill="#f8fafc"/>
  <text x="55" y="268" font-size="7" fill="#6b7280">Q_gas = 180,000,000</text>

  <rect x="50" y="276" width="130" height="18" rx="2" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="55" y="289" font-size="8" font-weight="700" fill="#166534">Q_total = 9,097</text>

  <!-- ═══ RIGHT: COMPARISON ═══ -->
  <text x="400" y="52" font-size="10" font-weight="700" fill="#1e40af">(b) Design Scenarios — All Pass Q > 5,000</text>

  <!-- Horizontal bar chart -->
  <!-- Threshold line -->
  <line x1="437" y1="65" x2="437" y2="200" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="437" y="210" text-anchor="middle" font-size="7" font-weight="600" fill="#ef4444">Q = 5,000</text>
  <text x="437" y="220" text-anchor="middle" font-size="6" fill="#ef4444">(minimum)</text>

  <!-- Scale markers -->
  <text x="400" y="63" text-anchor="middle" font-size="6" fill="#9ca3af">0</text>
  <text x="437" y="63" text-anchor="middle" font-size="6" fill="#9ca3af">5k</text>
  <text x="475" y="63" text-anchor="middle" font-size="6" fill="#9ca3af">10k</text>
  <text x="550" y="63" text-anchor="middle" font-size="6" fill="#9ca3af">20k</text>
  <text x="700" y="63" text-anchor="middle" font-size="6" fill="#9ca3af">40k</text>

  <!-- Scenario 1: Boro 5um -->
  <rect x="400" y="75" width="68" height="20" rx="3" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="395" y="89" text-anchor="end" font-size="6.5" fill="#374151">Boro, 5 µm</text>
  <text x="472" y="89" font-size="7" font-weight="600" fill="#1e40af">9,097 ✅</text>

  <!-- Scenario 2: Boro 2um + iso -->
  <rect x="400" y="100" width="71" height="20" rx="3" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="395" y="114" text-anchor="end" font-size="6.5" fill="#374151">Boro, 2 µm + iso</text>
  <text x="475" y="114" font-size="7" font-weight="600" fill="#1e40af">9,511 ✅</text>

  <!-- Scenario 3: FS 5um -->
  <rect x="400" y="130" width="227" height="20" rx="3" fill="#86efac" stroke="#16a34a" stroke-width="0.8"/>
  <text x="395" y="144" text-anchor="end" font-size="6.5" fill="#374151">Fused silica, 5 µm</text>
  <text x="631" y="144" font-size="7" font-weight="600" fill="#166534">51,433 ✅</text>

  <!-- Scenario 4: FS optimized -->
  <rect x="400" y="155" width="282" height="20" rx="3" fill="#86efac" stroke="#16a34a" stroke-width="0.8"/>
  <text x="395" y="169" text-anchor="end" font-size="6.5" fill="#374151">Fused silica, opt.</text>
  <text x="690" y="169" font-size="7" font-weight="600" fill="#166534">66,152 ✅</text>

  <!-- KEY FINDING -->
  <rect x="380" y="240" width="310" height="70" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.2"/>
  <text x="535" y="260" text-anchor="middle" font-size="9" font-weight="700" fill="#991b1b">KEY FINDING</text>
  <text x="535" y="276" text-anchor="middle" font-size="8" fill="#374151">Anchor loss is NOT the bottleneck.</text>
  <text x="535" y="290" text-anchor="middle" font-size="7.5" fill="#6b7280">The bulk glass material is the dominant loss (91%).</text>
  <text x="535" y="303" text-anchor="middle" font-size="7.5" fill="#6b7280">MEMS fabrication preserves 91% of bulk Q.</text>
</svg>