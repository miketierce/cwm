<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 606 784" width="8.5in" height="11in">
  <!-- US Letter. Print at 100% scale. -->
  <!-- Overview page: all three grid options at ~55% scale -->
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .title { font-size: 14pt; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 10pt; fill: #444; }
    .label { font-size: 8.5pt; fill: #1a1a1a; }
    .dim { font-size: 7.5pt; fill: #c00; font-weight: 600; }
    .note { font-size: 7pt; fill: #555; font-style: italic; }
    .cut-line { stroke: #333; stroke-width: 1.2; stroke-dasharray: 6,3; fill: none; }
    .grid-line { stroke: #ddd; stroke-width: 0.5; }
    .dim-line { stroke: #c00; stroke-width: 0.6; fill: none; }
    .dim-arrow { fill: #c00; stroke: none; }
    .pinhole { fill: none; stroke: #c00; stroke-width: 1.5; }
    .pinhole-opt { fill: none; stroke: #c00; stroke-width: 1; stroke-dasharray: 3,2; }
    .crosshair { stroke: #c00; stroke-width: 0.5; stroke-dasharray: 2,1; }
    .chamber { fill: none; stroke: #2a7fff; stroke-width: 0.6; stroke-dasharray: 3,2; }
  </style>

  <!-- Page title -->
  <text x="303" y="36" text-anchor="middle" class="title">CWM Experiment Guide — Multi-Rod Grid Template</text>
  <text x="303" y="52" text-anchor="middle" class="subtitle">Print at 100% (no scaling). Verify ruler. Divider: 165 × 140 mm for CH-BOX (item 11). 30 mm rod spacing.</text>

  <!-- Calibration ruler -->
  <g transform="translate(206, 62)">
    <rect x="0" y="0" width="141.73" height="12" fill="none" stroke="#333" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="0" y2="12" stroke="#333" stroke-width="0.8"/>
    <line x1="141.73" y1="0" x2="141.73" y2="12" stroke="#333" stroke-width="0.8"/>
    <line x1="28.35" y1="0" x2="28.35" y2="8" stroke="#333" stroke-width="0.5"/>
    <line x1="56.69" y1="0" x2="56.69" y2="8" stroke="#333" stroke-width="0.5"/>
    <line x1="85.04" y1="0" x2="85.04" y2="8" stroke="#333" stroke-width="0.5"/>
    <line x1="113.39" y1="0" x2="113.39" y2="8" stroke="#333" stroke-width="0.5"/>
    <text x="0" y="24" class="label" text-anchor="middle">0</text>
    <text x="28.35" y="24" class="label" text-anchor="middle">10</text>
    <text x="56.69" y="24" class="label" text-anchor="middle">20</text>
    <text x="85.04" y="24" class="label" text-anchor="middle">30</text>
    <text x="113.39" y="24" class="label" text-anchor="middle">40</text>
    <text x="141.73" y="24" class="label" text-anchor="middle">50 mm</text>
  </g>

  <!-- ================================================================== -->
  <!-- All schematics at 55% scale                                        -->
  <!-- 30 mm at 55% = 16.5 mm = 46.77 pt between centres                 -->
  <!-- 15 mm at 55% = 8.25 mm = 23.39 pt (half-spacing offset)          -->
  <!-- Divider at 55%: 165×0.55=90.75mm=257.24pt, 140×0.55=77mm=218.27pt -->
  <!-- Divider centre: 128.62, 109.14                                     -->
  <!-- ================================================================== -->

  <!-- ================================================================== -->
  <!-- OPTION A: 2×2 GRID (4 rods) — Experiments 9–11                    -->
  <!-- Col offsets: ±15mm×0.55 = ±23.39pt from centre 128.62             -->
  <!--   Col 1: 105.23   Col 2: 152.01                                   -->
  <!-- Row offsets: ±15mm×0.55 = ±23.39pt from centre 109.14             -->
  <!--   Row 1: 85.75    Row 2: 132.53                                   -->
  <!-- ================================================================== -->

  <text x="56" y="108" class="label" font-weight="700">OPTION A: 2×2 Grid (4 rods) — Experiments 9–11</text>
  <text x="56" y="122" class="note">Cut 165 × 140 mm. Punch 4 holes. Cut TWO identical dividers, space 75 mm apart in box.</text>

  <g transform="translate(56, 134)">
    <rect x="0" y="0" width="257.24" height="218.27" class="cut-line" rx="2"/>

    <!-- Dims -->
    <text x="128.62" y="-6" text-anchor="middle" class="dim">165 mm</text>
    <text x="267" y="109.14" text-anchor="start" class="dim" transform="rotate(90, 267, 109.14)">140 mm</text>

    <!-- Pinholes -->
    <circle cx="105.23" cy="85.75" r="5.46" class="pinhole"/>
    <text x="105.23" y="78" text-anchor="middle" class="dim">R1</text>

    <circle cx="152.01" cy="85.75" r="5.46" class="pinhole"/>
    <text x="152.01" y="78" text-anchor="middle" class="dim">R2</text>

    <circle cx="105.23" cy="132.53" r="5.46" class="pinhole"/>
    <text x="105.23" y="147" text-anchor="middle" class="dim">R3</text>

    <circle cx="152.01" cy="132.53" r="5.46" class="pinhole"/>
    <text x="152.01" y="147" text-anchor="middle" class="dim">R4</text>

    <!-- Spacing labels -->
    <line x1="105.23" y1="71" x2="152.01" y2="71" class="dim-line"/>
    <text x="128.62" y="68" text-anchor="middle" class="dim">30 mm</text>

    <line x1="159" y1="85.75" x2="159" y2="132.53" class="dim-line"/>
    <text x="168" y="112" text-anchor="start" class="dim">30 mm</text>

    <!-- PZT side -->
    <text x="4" y="109" text-anchor="start" class="label" fill="#2a7fff">← PZT</text>

    <!-- Chamber outlines (30 mm at 55% = 46.77pt) -->
    <rect x="81.84" y="62.36" width="46.77" height="46.77" class="chamber"/>
    <rect x="128.62" y="62.36" width="46.77" height="46.77" class="chamber"/>
    <rect x="81.84" y="109.14" width="46.77" height="46.77" class="chamber"/>
    <rect x="128.62" y="109.14" width="46.77" height="46.77" class="chamber"/>
  </g>

  <!-- ================================================================== -->
  <!-- OPTION B: 3×2 GRID (6 rods)                                       -->
  <!-- Col offsets: −30, 0, +30 mm × 0.55 = −46.77, 0, +46.77 pt       -->
  <!--   Col 1: 81.85   Col 2: 128.62   Col 3: 175.39                   -->
  <!-- Rows: same as Option A                                             -->
  <!-- ================================================================== -->

  <text x="336" y="108" class="label" font-weight="700">OPTION B: 3×2 Grid (6 rods)</text>
  <text x="336" y="122" class="note">Same divider size. Punch 6 holes.</text>

  <g transform="translate(336, 134)">
    <rect x="0" y="0" width="257.24" height="218.27" class="cut-line" rx="2"/>
    <text x="128.62" y="-6" text-anchor="middle" class="dim">165 mm</text>

    <circle cx="81.85" cy="85.75" r="5.46" class="pinhole"/>
    <text x="81.85" y="78" text-anchor="middle" class="dim">R1</text>

    <circle cx="128.62" cy="85.75" r="5.46" class="pinhole"/>
    <text x="128.62" y="78" text-anchor="middle" class="dim">R2</text>

    <circle cx="175.39" cy="85.75" r="5.46" class="pinhole"/>
    <text x="175.39" y="78" text-anchor="middle" class="dim">R3</text>

    <circle cx="81.85" cy="132.53" r="5.46" class="pinhole"/>
    <text x="81.85" y="147" text-anchor="middle" class="dim">R4</text>

    <circle cx="128.62" cy="132.53" r="5.46" class="pinhole"/>
    <text x="128.62" y="147" text-anchor="middle" class="dim">R5</text>

    <circle cx="175.39" cy="132.53" r="5.46" class="pinhole"/>
    <text x="175.39" y="147" text-anchor="middle" class="dim">R6</text>

    <!-- Spacing -->
    <line x1="81.85" y1="71" x2="128.62" y2="71" class="dim-line"/>
    <text x="105.23" y="68" text-anchor="middle" class="dim">30</text>
    <line x1="128.62" y1="71" x2="175.39" y2="71" class="dim-line"/>
    <text x="152.01" y="68" text-anchor="middle" class="dim">30 mm</text>

    <!-- PZT side -->
    <text x="4" y="109" text-anchor="start" class="label" fill="#2a7fff">← PZT</text>
  </g>

  <!-- ================================================================== -->
  <!-- OPTION C: 5×2 GRID (10 rods) — Experiment 12                      -->
  <!-- Col offsets: −60, −30, 0, +30, +60 mm × 0.55                     -->
  <!--   = −93.54, −46.77, 0, +46.77, +93.54 pt from centre 128.62      -->
  <!--   Col 1: 35.08  Col 2: 81.85  Col 3: 128.62  Col 4: 175.39  Col 5: 222.16 -->
  <!-- Grid span: 120mm×0.55 = 66mm = 187.09pt                          -->
  <!-- ================================================================== -->

  <text x="56" y="380" class="label" font-weight="700">OPTION C: 5×2 Grid (10 rods) — Experiment 12 (max capacity)</text>
  <text x="56" y="394" class="note">Same 165 × 140 mm divider. Grid spans 120 × 30 mm — fits with 22.5 mm margins on each side.</text>

  <g transform="translate(56, 406)">
    <rect x="0" y="0" width="257.24" height="218.27" class="cut-line" rx="2"/>
    <text x="128.62" y="-6" text-anchor="middle" class="dim">165 mm</text>
    <text x="267" y="109.14" text-anchor="start" class="dim" transform="rotate(90, 267, 109.14)">140 mm</text>

    <!-- Row 1 -->
    <circle cx="35.08" cy="85.75" r="5.46" class="pinhole"/>
    <text x="35.08" y="78" text-anchor="middle" class="dim">R1</text>

    <circle cx="81.85" cy="85.75" r="5.46" class="pinhole"/>
    <text x="81.85" y="78" text-anchor="middle" class="dim">R2</text>

    <circle cx="128.62" cy="85.75" r="5.46" class="pinhole"/>
    <text x="128.62" y="78" text-anchor="middle" class="dim">R3</text>

    <circle cx="175.39" cy="85.75" r="5.46" class="pinhole"/>
    <text x="175.39" y="78" text-anchor="middle" class="dim">R4</text>

    <circle cx="222.16" cy="85.75" r="5.46" class="pinhole"/>
    <text x="222.16" y="78" text-anchor="middle" class="dim">R5</text>

    <!-- Row 2 -->
    <circle cx="35.08" cy="132.53" r="5.46" class="pinhole"/>
    <text x="35.08" y="147" text-anchor="middle" class="dim">R6</text>

    <circle cx="81.85" cy="132.53" r="5.46" class="pinhole"/>
    <text x="81.85" y="147" text-anchor="middle" class="dim">R7</text>

    <circle cx="128.62" cy="132.53" r="5.46" class="pinhole"/>
    <text x="128.62" y="147" text-anchor="middle" class="dim">R8</text>

    <circle cx="175.39" cy="132.53" r="5.46" class="pinhole"/>
    <text x="175.39" y="147" text-anchor="middle" class="dim">R9</text>

    <circle cx="222.16" cy="132.53" r="5.46" class="pinhole"/>
    <text x="222.16" y="147" text-anchor="middle" class="dim">R10</text>

    <!-- Spacing labels -->
    <line x1="35.08" y1="71" x2="81.85" y2="71" class="dim-line"/>
    <text x="58.47" y="68" text-anchor="middle" class="dim">30</text>
    <line x1="81.85" y1="71" x2="128.62" y2="71" class="dim-line"/>
    <text x="105.23" y="68" text-anchor="middle" class="dim">30</text>
    <line x1="128.62" y1="71" x2="175.39" y2="71" class="dim-line"/>
    <text x="152.01" y="68" text-anchor="middle" class="dim">30</text>
    <line x1="175.39" y1="71" x2="222.16" y2="71" class="dim-line"/>
    <text x="198.78" y="68" text-anchor="middle" class="dim">30 mm</text>

    <!-- PZT side -->
    <text x="4" y="109" text-anchor="start" class="label" fill="#2a7fff">← PZT</text>
  </g>

  <!-- ================================================================== -->
  <!-- KEY / NOTES                                                         -->
  <!-- ================================================================== -->

  <g transform="translate(336, 406)">
    <text x="0" y="0" class="label" font-weight="700">Assembly Notes</text>
    <text x="0" y="18" class="note">1. Choose grid option based on experiment:</text>
    <text x="10" y="30" class="note">• 2×2 (4 rods): Experiments 9–11</text>
    <text x="10" y="42" class="note">• 3×2 (6 rods): Experiments 9–11 (extra rods)</text>
    <text x="10" y="54" class="note">• 5×2 (10 rods): Experiment 12 (password vault)</text>
    <text x="0" y="72" class="note">2. Cut TWO identical cardboard rectangles</text>
    <text x="10" y="84" class="note">per grid option (165 × 140 mm each).</text>
    <text x="0" y="102" class="note">3. Punch ALL pinholes at 7 mm diameter</text>
    <text x="10" y="114" class="note">using hollow punch (item 22).</text>
    <text x="0" y="132" class="note">4. Drop both dividers into box 75 mm apart.</text>
    <text x="10" y="144" class="note">Rods slide horizontally through aligned holes.</text>
    <text x="0" y="162" class="note">5. PZT ends face the same end of the box.</text>
    <text x="10" y="174" class="note">25 mm discs overhang rod by 9.5 mm —</text>
    <text x="10" y="186" class="note">30 mm spacing ensures 5 mm clearance.</text>
    <text x="0" y="210" class="note" fill="#2a7fff">Blue dashed lines = acoustic isolation chambers</text>
    <text x="0" y="222" class="note">30 mm spacing = 5× rod diameter — sufficient</text>
    <text x="0" y="234" class="note">acoustic isolation at experimental power levels.</text>
  </g>

  <!-- Footer -->
  <text x="303" y="750" text-anchor="middle" class="note">Template T.2 — CWM Macro-Scale Experiment Guide — github.com/miketierce/cwm</text>
  <text x="303" y="762" text-anchor="middle" class="note">All grids use 30 mm centre-to-centre rod spacing (5 mm clearance for 25 mm PZT discs). Scale drawings at ~55% — use rulers to mark cardboard.</text>
</svg>
