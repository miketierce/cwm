<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .title { font-size: 13px; font-weight: 600; fill: #1a1a2e; }
      .label { font-size: 10px; fill: #444; }
      .label-bold { font-size: 10.5px; fill: #1a1a2e; font-weight: 600; }
      .axis-label { font-size: 9px; fill: #666; }
      .annotation { font-size: 11px; fill: #0d7377; font-weight: 600; }
      .heading { font-size: 11px; fill: #1a1a2e; font-weight: 600; }
    </style>
    <marker id="arrowNS" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto">
      <polygon points="0,0 8,2.5 0,5" fill="#555"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto">
      <polygon points="0,0 8,2.5 0,5" fill="#27ae60"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto">
      <polygon points="0,0 8,2.5 0,5" fill="#8e44ad"/>
    </marker>
  </defs>

  <rect width="720" height="360" fill="#fafafa" rx="4"/>
  <text x="360" y="22" text-anchor="middle" class="title">Null-Space Multiplexing: Dual-Channel Encoding</text>

  <!-- ═══ LEFT: Coupling Matrix ═══ -->
  <text x="110" y="50" text-anchor="middle" class="heading">Coupling Matrix C</text>
  <text x="110" y="63" text-anchor="middle" class="axis-label">(n_modes × n_perturbations)</text>

  <!-- Matrix rectangle -->
  <rect x="30" y="75" width="160" height="100" rx="3" fill="white" stroke="#333" stroke-width="1.5"/>

  <!-- Column space (left portion) -->
  <rect x="30" y="75" width="100" height="100" rx="3" fill="#27ae60" opacity="0.15"/>
  <text x="80" y="130" text-anchor="middle" class="label-bold" fill="#27ae60">Column Space</text>
  <text x="80" y="145" text-anchor="middle" class="axis-label" fill="#27ae60">rank = 10</text>

  <!-- Null space (right portion) -->
  <rect x="130" y="75" width="60" height="100" rx="3" fill="#8e44ad" opacity="0.15"/>
  <text x="160" y="130" text-anchor="middle" class="label-bold" fill="#8e44ad">Null</text>
  <text x="160" y="143" text-anchor="middle" class="label-bold" fill="#8e44ad">Space</text>
  <text x="160" y="158" text-anchor="middle" class="axis-label" fill="#8e44ad">dim = 6</text>

  <!-- Dimension labels -->
  <text x="110" y="88" text-anchor="middle" class="axis-label">10 readout modes</text>
  <line x1="30" y1="175" x2="190" y2="175" stroke="#333" stroke-width="0.5"/>
  <text x="110" y="190" text-anchor="middle" class="axis-label">16 perturbation sites</text>

  <!-- Key insight box -->
  <rect x="15" y="205" width="190" height="50" rx="6" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1"/>
  <text x="110" y="222" text-anchor="middle" class="label-bold" fill="#856404">Key Insight</text>
  <text x="110" y="237" text-anchor="middle" class="axis-label" fill="#856404">More perturbation sites than readout</text>
  <text x="110" y="249" text-anchor="middle" class="axis-label" fill="#856404">modes ⟹ non-trivial null space exists</text>

  <!-- ═══ CENTER: Dual-channel arrows ═══ -->

  <!-- Standard channel (green) -->
  <line x1="200" y1="105" x2="320" y2="80" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="260" y="75" text-anchor="middle" class="label-bold" fill="#27ae60">Standard</text>
  <text x="260" y="87" text-anchor="middle" class="label-bold" fill="#27ae60">Channel</text>

  <!-- Hidden channel (purple) -->
  <line x1="200" y1="145" x2="320" y2="200" stroke="#8e44ad" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="260" y="185" text-anchor="middle" class="label-bold" fill="#8e44ad">Hidden</text>
  <text x="260" y="197" text-anchor="middle" class="label-bold" fill="#8e44ad">Channel</text>

  <!-- ═══ RIGHT TOP: Standard readout ═══ -->
  <rect x="330" y="48" width="185" height="80" rx="6" fill="#27ae60" opacity="0.08" stroke="#27ae60" stroke-width="1.5"/>
  <text x="422" y="68" text-anchor="middle" class="label-bold" fill="#27ae60">Standard Readout</text>
  <text x="422" y="84" text-anchor="middle" class="axis-label">Project onto column space of C</text>
  <text x="422" y="98" text-anchor="middle" class="axis-label">Recovers encoded mode patterns</text>
  <text x="422" y="115" text-anchor="middle" class="annotation" fill="#27ae60">Fidelity: 1.000</text>

  <!-- ═══ RIGHT BOTTOM: Complementary readout ═══ -->
  <rect x="330" y="168" width="185" height="80" rx="6" fill="#8e44ad" opacity="0.08" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="422" y="188" text-anchor="middle" class="label-bold" fill="#8e44ad">Complementary Readout</text>
  <text x="422" y="204" text-anchor="middle" class="axis-label">Project onto null space of C</text>
  <text x="422" y="218" text-anchor="middle" class="axis-label">Recovers hidden patterns</text>
  <text x="422" y="235" text-anchor="middle" class="annotation" fill="#8e44ad">Fidelity: 1.000</text>

  <!-- Invisibility annotation -->
  <rect x="530" y="130" width="170" height="40" rx="4" fill="white" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="615" y="148" text-anchor="middle" class="axis-label" fill="#c0392b" font-weight="600">Null-space patterns are</text>
  <text x="615" y="161" text-anchor="middle" class="axis-label" fill="#c0392b" font-weight="600">invisible to standard readout</text>

  <!-- Cross arrow from hidden to standard -->
  <line x1="430" y1="168" x2="430" y2="135" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="455" y="155" class="axis-label" fill="#c0392b">✗ zero leakage</text>

  <!-- ═══ BOTTOM: Capacity Summary ═══ -->
  <rect x="40" y="275" width="640" height="70" rx="8" fill="white" stroke="#0d7377" stroke-width="1.5"/>

  <text x="360" y="295" text-anchor="middle" class="heading" fill="#0d7377">Combined Capacity</text>

  <!-- Standard bar -->
  <rect x="60" y="305" width="240" height="24" rx="4" fill="#27ae60" opacity="0.25" stroke="#27ae60" stroke-width="1"/>
  <text x="180" y="321" text-anchor="middle" class="label-bold" fill="#27ae60">Standard: 10 modes × 16.4 = 164 bits</text>

  <!-- Hidden bar -->
  <rect x="300" y="305" width="145" height="24" rx="4" fill="#8e44ad" opacity="0.25" stroke="#8e44ad" stroke-width="1"/>
  <text x="372" y="321" text-anchor="middle" class="label-bold" fill="#8e44ad">Hidden: 6 dims × 16.4 = 98 bits</text>

  <!-- Total -->
  <rect x="470" y="305" width="190" height="24" rx="4" fill="#0d7377" opacity="0.15" stroke="#0d7377" stroke-width="1.5"/>
  <text x="565" y="321" text-anchor="middle" style="font-size:13px; fill:#0d7377; font-weight:700;">Total: 262 bits (+60%)</text>
</svg>