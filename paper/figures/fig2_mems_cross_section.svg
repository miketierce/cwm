<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="dim" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#6b7280"/></marker>
    <marker id="dimR" markerWidth="6" markerHeight="6" refX="0" refY="3" orient="auto"><path d="M6,0 L0,3 L6,6" fill="#6b7280"/></marker>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="50%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <pattern id="cross" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#f3f4f6"/>
      <path d="M0,3 L6,3 M3,0 L3,6" stroke="#d1d5db" stroke-width="0.3"/>
    </pattern>
  </defs>

  <rect width="720" height="500" fill="white" rx="4"/>
  <text x="360" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">Figure 2 · MEMS Resonator Cross-Section and Scale Comparison</text>

  <!-- ═══ A: MEMS CROSS-SECTION ═══ -->
  <text x="30" y="52" font-size="11" font-weight="700" fill="#1e40af">(a) Single MEMS Resonator Element — Side View</text>

  <!-- Substrate -->
  <rect x="60" y="195" width="360" height="40" rx="0" fill="url(#cross)" stroke="#9ca3af" stroke-width="1"/>
  <text x="240" y="220" text-anchor="middle" font-size="9" fill="#6b7280">Silicon CMOS Substrate</text>

  <!-- Vacuum cavity -->
  <rect x="100" y="130" width="280" height="65" rx="3" fill="#eff6ff" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="3,2"/>
  <text x="240" y="188" text-anchor="middle" font-size="7" fill="#93c5fd">Vacuum cavity (~1 Pa)</text>

  <!-- Anchor blocks (left) -->
  <rect x="95" y="160" width="30" height="35" rx="2" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
  <text x="110" y="182" text-anchor="middle" font-size="5.5" fill="#6b7280">Anchor</text>

  <!-- Anchor blocks (right) -->
  <rect x="355" y="160" width="30" height="35" rx="2" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
  <text x="370" y="182" text-anchor="middle" font-size="5.5" fill="#6b7280">Anchor</text>

  <!-- Tether left -->
  <rect x="125" y="154" width="25" height="4" rx="1" fill="#d1d5db" stroke="#9ca3af" stroke-width="0.7"/>
  <text x="137" y="150" text-anchor="middle" font-size="5.5" fill="#9ca3af">Tether</text>

  <!-- Tether right -->
  <rect x="330" y="154" width="25" height="4" rx="1" fill="#d1d5db" stroke="#9ca3af" stroke-width="0.7"/>
  <text x="343" y="150" text-anchor="middle" font-size="5.5" fill="#9ca3af">Tether</text>

  <!-- AlN piezo left -->
  <rect x="148" y="140" width="22" height="10" rx="2" fill="#fbbf24" stroke="#d97706" stroke-width="0.8"/>
  <text x="159" y="137" text-anchor="middle" font-size="5.5" fill="#92400e">AlN Piezo</text>

  <!-- AlN piezo right -->
  <rect x="310" y="140" width="22" height="10" rx="2" fill="#fbbf24" stroke="#d97706" stroke-width="0.8"/>
  <text x="321" y="137" text-anchor="middle" font-size="5.5" fill="#92400e">AlN Piezo</text>

  <!-- Glass rod -->
  <rect x="150" y="148" width="180" height="14" rx="7" fill="url(#glass)" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- Perturbation dots on rod -->
  <circle cx="195" cy="147" r="3.5" fill="#ef4444" stroke="#b91c1c" stroke-width="0.5"/>
  <circle cx="240" cy="147" r="2.5" fill="#ef4444" stroke="#b91c1c" stroke-width="0.5"/>
  <circle cx="300" cy="147" r="4" fill="#ef4444" stroke="#b91c1c" stroke-width="0.5"/>

  <!-- Label perturbations -->
  <line x1="195" y1="143" x2="195" y2="125" stroke="#ef4444" stroke-width="0.5" stroke-dasharray="2,1"/>
  <line x1="240" y1="144" x2="240" y2="125" stroke="#ef4444" stroke-width="0.5" stroke-dasharray="2,1"/>
  <line x1="300" y1="143" x2="300" y2="125" stroke="#ef4444" stroke-width="0.5" stroke-dasharray="2,1"/>
  <text x="240" y="122" text-anchor="middle" font-size="6.5" fill="#dc2626">Metal mass perturbations (Au/Pt, 10–100 nm)</text>

  <!-- Dimension: rod length -->
  <line x1="150" y1="108" x2="330" y2="108" stroke="#6b7280" stroke-width="0.7" marker-start="url(#dimR)" marker-end="url(#dim)"/>
  <text x="240" y="105" text-anchor="middle" font-size="8" font-weight="600" fill="#374151">L = 1 mm</text>

  <!-- Dimension: diameter -->
  <line x1="420" y1="148" x2="420" y2="162" stroke="#6b7280" stroke-width="0.7" marker-start="url(#dimR)" marker-end="url(#dim)"/>
  <text x="435" y="158" font-size="7" fill="#374151">d = 40 µm</text>

  <!-- Dimension: tether -->
  <line x1="125" y1="168" x2="150" y2="168" stroke="#6b7280" stroke-width="0.5" marker-start="url(#dimR)" marker-end="url(#dim)"/>
  <text x="137" y="175" text-anchor="middle" font-size="5.5" fill="#6b7280">50 µm</text>

  <!-- Electrode wires -->
  <line x1="159" y1="140" x2="159" y2="130" stroke="#d97706" stroke-width="0.7"/>
  <line x1="159" y1="130" x2="140" y2="115" stroke="#d97706" stroke-width="0.7"/>
  <circle cx="140" cy="115" r="2" fill="#d97706"/>
  <text x="130" y="113" text-anchor="end" font-size="5.5" fill="#92400e">Drive</text>

  <line x1="321" y1="140" x2="321" y2="130" stroke="#d97706" stroke-width="0.7"/>
  <line x1="321" y1="130" x2="340" y2="115" stroke="#d97706" stroke-width="0.7"/>
  <circle cx="340" cy="115" r="2" fill="#d97706"/>
  <text x="350" y="113" font-size="5.5" fill="#92400e">Sense</text>

  <!-- ═══ B: SCALE COMPARISON ═══ -->
  <text x="490" y="52" font-size="11" font-weight="700" fill="#1e40af">(b) Scale Reference</text>

  <!-- Human hair -->
  <rect x="490" y="70" width="80" height="2" rx="1" fill="#a3a3a3"/>
  <text x="580" y="74" font-size="7" fill="#6b7280">Human hair: ~70 µm</text>

  <!-- Rod diameter -->
  <rect x="490" y="88" width="80" height="1.2" rx="0.6" fill="#3b82f6"/>
  <text x="580" y="92" font-size="7" fill="#3b82f6">Rod diameter: 40 µm</text>

  <!-- Tether -->
  <rect x="490" y="104" width="80" height="0.3" rx="0.2" fill="#9ca3af"/>
  <text x="580" y="108" font-size="7" fill="#6b7280">Tether width: 5 µm</text>

  <!-- Penny -->
  <circle cx="530" cy="155" r="30" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="530" y="158" text-anchor="middle" font-size="7" fill="#92400e">US Penny</text>
  <text x="530" y="167" text-anchor="middle" font-size="6" fill="#92400e">19 mm ∅</text>

  <!-- 1mm rod on penny -->
  <rect x="515" y="142" width="30" height="1" rx="0.5" fill="#2563eb"/>
  <line x1="515" y1="138" x2="545" y2="138" stroke="#2563eb" stroke-width="0.5" marker-start="url(#dimR)" marker-end="url(#dim)"/>
  <text x="530" y="136" text-anchor="middle" font-size="6" font-weight="600" fill="#2563eb">1 mm rod</text>

  <!-- Chip size reference -->
  <rect x="490" y="195" width="80" height="30" rx="3" fill="#f3f4f6" stroke="#9ca3af" stroke-width="0.8"/>
  <text x="530" y="212" text-anchor="middle" font-size="6.5" fill="#374151">~140,000 rods</text>
  <text x="530" y="222" text-anchor="middle" font-size="6.5" fill="#374151">fit in 1 cm³</text>

  <!-- ═══ C: ARRAY TOP-DOWN VIEW ═══ -->
  <text x="30" y="260" font-size="11" font-weight="700" fill="#1e40af">(c) Resonator Array — Top-Down View (not to scale)</text>

  <!-- Array grid -->
  <rect x="60" y="275" width="240" height="200" rx="4" fill="#f8fafc" stroke="#d1d5db" stroke-width="1"/>

  <!-- Draw rod array (simplified 8x8 grid) -->
  <g opacity="0.9">
    <!-- Row labels -->
    <text x="55" y="295" text-anchor="end" font-size="6" fill="#6b7280">Row 1</text>
    <text x="55" y="317" text-anchor="end" font-size="6" fill="#6b7280">Row 2</text>
    <text x="55" y="339" text-anchor="end" font-size="6" fill="#6b7280">Row 3</text>

    <!-- Rods as thin rectangles -->
    <!-- Row 1 -->
    <rect x="75" y="288" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="108" y="288" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="141" y="288" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="174" y="288" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="207" y="288" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="240" y="288" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="273" y="288" width="14" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>

    <!-- Row 2 -->
    <rect x="75" y="310" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="108" y="310" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="141" y="310" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="174" y="310" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="207" y="310" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="240" y="310" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="273" y="310" width="14" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>

    <!-- Row 3 -->
    <rect x="75" y="332" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="108" y="332" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="141" y="332" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="174" y="332" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="207" y="332" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="240" y="332" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="273" y="332" width="14" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>

    <!-- Dots for continuation -->
    <text x="180" y="355" text-anchor="middle" font-size="10" fill="#9ca3af">. . .</text>

    <!-- More rows -->
    <rect x="75" y="365" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="108" y="365" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="141" y="365" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="174" y="365" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="207" y="365" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="240" y="365" width="28" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="273" y="365" width="14" height="3" rx="1.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.5"/>

    <!-- Highlight one rod -->
    <rect x="141" y="309.5" width="28" height="4" rx="2" fill="#16a34a" stroke="#166534" stroke-width="0.8"/>
  </g>

  <!-- Pitch dimension -->
  <line x1="75" y1="383" x2="108" y2="383" stroke="#6b7280" stroke-width="0.5" marker-start="url(#dimR)" marker-end="url(#dim)"/>
  <text x="91" y="393" text-anchor="middle" font-size="6" fill="#6b7280">80 µm pitch</text>

  <!-- CMOS readout label -->
  <rect x="60" y="405" width="240" height="30" rx="3" fill="#f3f4f6" stroke="#9ca3af" stroke-width="0.8"/>
  <text x="180" y="423" text-anchor="middle" font-size="8" fill="#374151">CMOS Readout Die (flip-chip bonded below)</text>

  <!-- Highlighted rod callout -->
  <line x1="169" y1="311" x2="240" y2="400" stroke="#16a34a" stroke-width="0.5" stroke-dasharray="3,2"/>

  <!-- ═══ D: Integration Stack ═══ -->
  <text x="340" y="260" font-size="11" font-weight="700" fill="#1e40af">(d) Chip Integration Stack</text>

  <!-- Stack layers -->
  <rect x="380" y="280" width="280" height="30" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="520" y="299" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">Vacuum-Sealed Glass Lid</text>

  <rect x="380" y="315" width="280" height="50" rx="3" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="520" y="336" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">Glass Resonator Array</text>
  <text x="520" y="350" text-anchor="middle" font-size="7" fill="#3b82f6">~140,000 rods × 120,000 bits each</text>
  <text x="520" y="360" text-anchor="middle" font-size="7" fill="#3b82f6">= 17 Gbit (2.1 GB) per cm³</text>

  <rect x="380" y="370" width="280" height="10" rx="2" fill="#fbbf24" stroke="#d97706" stroke-width="0.8"/>
  <text x="520" y="378" text-anchor="middle" font-size="6" fill="#92400e">AlN Piezo + Electrodes</text>

  <rect x="380" y="385" width="280" height="8" rx="2" fill="#c4b5fd" stroke="#7c3aed" stroke-width="0.8"/>
  <text x="520" y="392" text-anchor="middle" font-size="6" fill="#5b21b6">Solder Bumps (flip-chip)</text>

  <rect x="380" y="398" width="280" height="40" rx="3" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <text x="520" y="415" text-anchor="middle" font-size="9" font-weight="600" fill="#374151">CMOS Readout IC</text>
  <text x="520" y="428" text-anchor="middle" font-size="7" fill="#6b7280">MUX + Sense Amps + FFT + Temp Sensor</text>

  <rect x="380" y="443" width="280" height="20" rx="3" fill="#e5e7eb" stroke="#9ca3af" stroke-width="0.8"/>
  <text x="520" y="457" text-anchor="middle" font-size="8" fill="#6b7280">Package Substrate (BGA/QFN)</text>

  <!-- Dimension of stack -->
  <line x1="670" y1="280" x2="670" y2="463" stroke="#6b7280" stroke-width="0.5" marker-start="url(#dimR)" marker-end="url(#dim)"/>
  <text x="685" y="375" text-anchor="middle" font-size="7" fill="#374151" transform="rotate(90,685,375)">~1.5 mm total</text>

  <!-- Overall chip dimension -->
  <line x1="380" y1="475" x2="660" y2="475" stroke="#6b7280" stroke-width="0.5" marker-start="url(#dimR)" marker-end="url(#dim)"/>
  <text x="520" y="490" text-anchor="middle" font-size="8" fill="#374151">~10 × 10 mm die</text>
</svg>