<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 606 784" width="8.5in" height="11in">
  <!-- US Letter. Print at 100% scale. -->
  <!-- Option A: 2×2 Grid (4 rods), 30 mm centre-to-centre spacing -->
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .title { font-size: 13pt; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 9.5pt; fill: #444; }
    .label { font-size: 8.5pt; fill: #1a1a1a; }
    .dim { font-size: 7.5pt; fill: #c00; font-weight: 600; }
    .note { font-size: 7pt; fill: #555; font-style: italic; }
    .cut-line { stroke: #333; stroke-width: 1.2; stroke-dasharray: 6,3; fill: none; }
    .dim-line { stroke: #c00; stroke-width: 0.6; fill: none; }
    .dim-arrow { fill: #c00; stroke: none; }
    .pinhole { fill: none; stroke: #c00; stroke-width: 1.5; }
    .crosshair { stroke: #c00; stroke-width: 0.5; stroke-dasharray: 2,1; }
    .chamber { fill: none; stroke: #2a7fff; stroke-width: 0.6; stroke-dasharray: 3,2; }
    .pzt-outline { fill: none; stroke: #999; stroke-width: 0.5; stroke-dasharray: 2,2; }
  </style>

  <!-- Page title -->
  <text x="303" y="32" text-anchor="middle" class="title">Template T.2A — Multi-Rod Grid Divider: 2×2 (4 rods)</text>
  <text x="303" y="46" text-anchor="middle" class="subtitle">Print at 100% (no scaling) on US Letter paper. Verify the ruler below measures exactly 50 mm.</text>

  <!-- Calibration ruler -->
  <g transform="translate(206, 56)">
    <rect x="0" y="0" width="141.73" height="12" fill="none" stroke="#333" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="0" y2="12" stroke="#333" stroke-width="0.8"/>
    <line x1="141.73" y1="0" x2="141.73" y2="12" stroke="#333" stroke-width="0.8"/>
    <line x1="28.35" y1="0" x2="28.35" y2="8" stroke="#333" stroke-width="0.5"/>
    <line x1="56.69" y1="0" x2="56.69" y2="8" stroke="#333" stroke-width="0.5"/>
    <line x1="85.04" y1="0" x2="85.04" y2="8" stroke="#333" stroke-width="0.5"/>
    <line x1="113.39" y1="0" x2="113.39" y2="8" stroke="#333" stroke-width="0.5"/>
    <line x1="14.17" y1="0" x2="14.17" y2="5" stroke="#333" stroke-width="0.3"/>
    <line x1="42.52" y1="0" x2="42.52" y2="5" stroke="#333" stroke-width="0.3"/>
    <line x1="70.87" y1="0" x2="70.87" y2="5" stroke="#333" stroke-width="0.3"/>
    <line x1="99.21" y1="0" x2="99.21" y2="5" stroke="#333" stroke-width="0.3"/>
    <line x1="127.56" y1="0" x2="127.56" y2="5" stroke="#333" stroke-width="0.3"/>
    <text x="0" y="24" class="label" text-anchor="middle">0</text>
    <text x="28.35" y="24" class="label" text-anchor="middle">10</text>
    <text x="56.69" y="24" class="label" text-anchor="middle">20</text>
    <text x="85.04" y="24" class="label" text-anchor="middle">30</text>
    <text x="113.39" y="24" class="label" text-anchor="middle">40</text>
    <text x="141.73" y="24" class="label" text-anchor="middle">50 mm</text>
  </g>

  <!-- ================================================================== -->
  <!-- 2×2 GRID at 1:1 SCALE — 30 mm centre-to-centre                    -->
  <!-- Divider: 165 mm × 140 mm = 467.72 × 396.85 pt                     -->
  <!-- Centered on page: x = (606−467.72)/2 ≈ 69.14                      -->
  <!-- 30 mm = 85.04 pt between centres                                   -->
  <!-- Grid centre = divider centre: 233.86, 198.43 (in divider coords)  -->
  <!-- Offsets: ±15 mm = ±42.52 pt from centre                           -->
  <!-- Col 1: 191.34   Col 2: 276.38                                     -->
  <!-- Row 1: 155.91   Row 2: 240.95                                     -->
  <!-- ================================================================== -->

  <text x="69" y="104" class="label" font-weight="700">2×2 GRID DIVIDER — cut 165 mm × 140 mm (6.5″ × 5.5″)</text>
  <text x="69" y="116" class="note">For Experiments 9–11. Cut TWO identical dividers. Punch 4 holes at 7 mm Ø. 30 mm spacing clears 25 mm PZT discs.</text>

  <g transform="translate(69, 128)">
    <!-- Outer cut line — 1:1 scale -->
    <rect x="0" y="0" width="467.72" height="396.85" class="cut-line" rx="2"/>

    <!-- Dimension: width -->
    <line x1="0" y1="-12" x2="467.72" y2="-12" class="dim-line"/>
    <line x1="0" y1="-18" x2="0" y2="-6" class="dim-line"/>
    <line x1="467.72" y1="-18" x2="467.72" y2="-6" class="dim-line"/>
    <text x="233.86" y="-16" text-anchor="middle" class="dim">165 mm (6.5″)</text>

    <!-- Dimension: height -->
    <line x1="-12" y1="0" x2="-12" y2="396.85" class="dim-line"/>
    <line x1="-18" y1="0" x2="-6" y2="0" class="dim-line"/>
    <line x1="-18" y1="396.85" x2="-6" y2="396.85" class="dim-line"/>
    <text x="-24" y="198.43" text-anchor="middle" class="dim" transform="rotate(-90, -24, 198.43)">140 mm (5.5″)</text>

    <!-- Centre crosshairs (light guides) -->
    <line x1="0" y1="198.43" x2="467.72" y2="198.43" stroke="#eee" stroke-width="0.4"/>
    <line x1="233.86" y1="0" x2="233.86" y2="396.85" stroke="#eee" stroke-width="0.4"/>

    <!-- 25 mm PZT disc outlines (grey dashed) — for visual clearance check -->
    <circle cx="191.34" cy="155.91" r="35.43" class="pzt-outline"/>
    <circle cx="276.38" cy="155.91" r="35.43" class="pzt-outline"/>
    <circle cx="191.34" cy="240.95" r="35.43" class="pzt-outline"/>
    <circle cx="276.38" cy="240.95" r="35.43" class="pzt-outline"/>

    <!-- Pinholes: 2×2 grid, 30 mm spacing, centred -->
    <!-- R1 (col 1, row 1) -->
    <circle cx="191.34" cy="155.91" r="9.92" class="pinhole"/>
    <line x1="176" y1="155.91" x2="207" y2="155.91" class="crosshair"/>
    <line x1="191.34" y1="141" x2="191.34" y2="171" class="crosshair"/>
    <text x="191.34" y="136" text-anchor="middle" class="dim">R1</text>

    <!-- R2 (col 2, row 1) -->
    <circle cx="276.38" cy="155.91" r="9.92" class="pinhole"/>
    <line x1="261" y1="155.91" x2="292" y2="155.91" class="crosshair"/>
    <line x1="276.38" y1="141" x2="276.38" y2="171" class="crosshair"/>
    <text x="276.38" y="136" text-anchor="middle" class="dim">R2</text>

    <!-- R3 (col 1, row 2) -->
    <circle cx="191.34" cy="240.95" r="9.92" class="pinhole"/>
    <line x1="176" y1="240.95" x2="207" y2="240.95" class="crosshair"/>
    <line x1="191.34" y1="226" x2="191.34" y2="256" class="crosshair"/>
    <text x="191.34" y="270" text-anchor="middle" class="dim">R3</text>

    <!-- R4 (col 2, row 2) -->
    <circle cx="276.38" cy="240.95" r="9.92" class="pinhole"/>
    <line x1="261" y1="240.95" x2="292" y2="240.95" class="crosshair"/>
    <line x1="276.38" y1="226" x2="276.38" y2="256" class="crosshair"/>
    <text x="276.38" y="270" text-anchor="middle" class="dim">R4</text>

    <!-- Spacing dimension: horizontal -->
    <line x1="191.34" y1="126" x2="276.38" y2="126" class="dim-line"/>
    <polygon points="191.34,126 197,123 197,129" class="dim-arrow"/>
    <polygon points="276.38,126 270.8,123 270.8,129" class="dim-arrow"/>
    <text x="233.86" y="122" text-anchor="middle" class="dim">30 mm</text>

    <!-- Spacing dimension: vertical -->
    <line x1="288" y1="155.91" x2="288" y2="240.95" class="dim-line"/>
    <polygon points="288,155.91 285,161.5 291,161.5" class="dim-arrow"/>
    <polygon points="288,240.95 285,235.4 291,235.4" class="dim-arrow"/>
    <text x="300" y="200" text-anchor="start" class="dim">30 mm</text>

    <!-- Acoustic isolation chambers (30 mm squares) -->
    <rect x="148.82" y="113.39" width="85.04" height="85.04" class="chamber"/>
    <rect x="233.86" y="113.39" width="85.04" height="85.04" class="chamber"/>
    <rect x="148.82" y="198.43" width="85.04" height="85.04" class="chamber"/>
    <rect x="233.86" y="198.43" width="85.04" height="85.04" class="chamber"/>

    <!-- PZT side label -->
    <text x="8" y="198" text-anchor="start" class="label" fill="#2a7fff">← PZT this side</text>

    <!-- Pinhole spec -->
    <text x="233.86" y="305" text-anchor="middle" class="dim">All pinholes: 7 mm Ø (hollow punch, item 22)</text>
    <text x="233.86" y="318" text-anchor="middle" class="note">Grey dashed circles = 25 mm PZT disc outline (5 mm clearance between adjacent discs)</text>

    <!-- Cut instruction -->
    <text x="6" y="16" class="note">✂ cut along dashed line</text>
  </g>

  <!-- Footer -->
  <text x="303" y="740" text-anchor="middle" class="note">Template T.2A — CWM Macro-Scale Experiment Guide — github.com/miketierce/cwm</text>
  <text x="303" y="752" text-anchor="middle" class="note">1:1 scale. Cut TWO identical dividers per experiment. Space 75 mm apart inside CH-BOX. Blue dashes = acoustic chamber boundaries.</text>
</svg>
