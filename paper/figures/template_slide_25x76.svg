<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 612 792" width="8.5in" height="11in">
  <!-- US Letter: 612×792 pt (8.5×11 in). Print at 100% scale. -->
  <!-- 1 mm = 2.8346 pt -->
  <!-- Plate: 25.4 mm = 71.96 pt wide, 76.2 mm = 215.89 pt tall -->
  <!-- PZT disc: 10 mm diameter = 28.35 pt dia, 14.17 pt radius -->
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .title { font-size: 13pt; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 9pt; fill: #444; }
    .label { font-size: 8pt; fill: #1a1a1a; }
    .label-bold { font-size: 8pt; fill: #1a1a1a; font-weight: 700; }
    .dim { font-size: 7pt; fill: #c00; font-weight: 600; }
    .note { font-size: 6.5pt; fill: #555; font-style: italic; }
    .inst { font-size: 7pt; fill: #333; }
    .plate-outline { fill: #f0f5ff; stroke: #2a7fff; stroke-width: 1.0; }
    .plate-clean { fill: none; stroke: #2a7fff; stroke-width: 0.8; }
    .pzt-tx { fill: none; stroke: #e67e00; stroke-width: 1.2; }
    .pzt-rx { fill: none; stroke: #2a7fff; stroke-width: 1.2; }
    .pzt-fill-tx { fill: #e67e00; fill-opacity: 0.12; }
    .pzt-fill-ne { fill: #2a7fff; fill-opacity: 0.12; }
    .pzt-fill-nw { fill: #00aa55; fill-opacity: 0.12; }
    .pzt-nw { fill: none; stroke: #00aa55; stroke-width: 1.2; }
    .crosshair { stroke: #c00; stroke-width: 0.4; }
    .center-dot { fill: #c00; stroke: none; }
    .dim-line { stroke: #c00; stroke-width: 0.5; }
    .dim-ext { stroke: #c00; stroke-width: 0.3; }
    .zone-hatch { fill: none; stroke: #ddd; stroke-width: 0.3; }
    .zone-label { font-size: 7pt; fill: #999; font-style: italic; }
    .ruler-bg { fill: #fafaf5; stroke: #333; stroke-width: 0.8; }
    .tick { stroke: #333; stroke-width: 0.5; }
    .tick-major { stroke: #333; stroke-width: 0.8; }
    .orient-arrow { fill: none; stroke: #888; stroke-width: 0.6; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#c00"/>
    </marker>
    <marker id="arrowhead-dim" markerWidth="5" markerHeight="3" refX="4.5" refY="1.5" orient="auto">
      <polygon points="0 0, 5 1.5, 0 3" fill="#c00"/>
    </marker>
    <!-- PZT guide: reusable group for a single PZT position mark -->
    <!-- Parameters passed via transform. PZT is 10mm dia = r14.17pt -->
  </defs>

  <!-- ================================================================ -->
  <!-- PAGE HEADER                                                       -->
  <!-- ================================================================ -->
  <text x="306" y="28" text-anchor="middle" class="title">CWM Plate Template — 25.4 × 76.2 mm Slide (1:1 Scale)</text>
  <text x="306" y="42" text-anchor="middle" class="subtitle">Print at 100% (no scaling). PZTs bond to underside. Top surface clear for perturbations.</text>
  <text x="306" y="54" text-anchor="middle" class="note">Verify: the calibration ruler below should measure exactly 50 mm with a physical ruler.</text>

  <!-- ================================================================ -->
  <!-- CALIBRATION RULER (50 mm = 141.73 pt)                             -->
  <!-- ================================================================ -->
