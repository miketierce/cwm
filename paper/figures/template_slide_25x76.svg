    <rect x="0" y="0" width="141.73" height="10" class="ruler-bg"/>
    <line x1="0" y1="0" x2="0" y2="10" class="tick-major"/>
    <line x1="28.35" y1="0" x2="28.35" y2="7" class="tick"/>
    <line x1="56.69" y1="0" x2="56.69" y2="7" class="tick"/>
