    <text x="36.0" y="232" text-anchor="middle" class="dim">12.7 mm (½″) c-c</text>

    <!-- ── Dimension: PZT diameter callout ── -->
    <line x1="36.0" y1="0.03" x2="50.17" y2="0.03" class="dim-line"/>
