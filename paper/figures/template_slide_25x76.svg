    <circle cx="54.0" cy="201.8" r="1.0" class="center-dot"/>

    <!-- ── RX labels ── -->
    <text x="85" y="195" class="label-bold" fill="#2a7fff">RX_NE</text>
    <text x="85" y="205" class="label-bold" fill="#00aa55">RX_NW</text>
    <text x="85" y="215" class="note">¼ and ¾ width, 5 mm from edge</text>

    <!-- ── Dimension: RX offset (5 mm from bottom) ── -->
