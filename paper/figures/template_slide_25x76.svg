  <!--   RX_NW: (6.35, 71.2)  — ¼ width, 5 mm from RX end              -->
  <!--                                                                   -->
  <!-- In pt:                                                            -->
  <!--   TX:    (36.0, 14.2)                                             -->
  <!--   RX_NE: (54.0, 201.8)                                           -->
  <!--   RX_NW: (18.0, 201.8)                                           -->
