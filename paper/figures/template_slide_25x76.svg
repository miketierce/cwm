  <!-- ================================================================ -->
  <g transform="translate(42, 610)">
    <text x="0" y="0" class="label-bold">Legend</text>
    <!-- TX -->
    <circle cx="10" cy="15" r="6" fill="none" stroke="#e67e00" stroke-width="1.2"/>
    <text x="22" y="19" class="label">Orange = TX PZT (drive)</text>
    <!-- RX_NE -->
    <circle cx="150" cy="15" r="6" fill="none" stroke="#2a7fff" stroke-width="1.2"/>
    <text x="162" y="19" class="label">Blue = RX_NE (receive, northeast)</text>
    <!-- RX_NW -->
    <circle cx="340" cy="15" r="6" fill="none" stroke="#00aa55" stroke-width="1.2"/>
    <text x="352" y="19" class="label">Green = RX_NW (receive, northwest)</text>
    <!-- Center dot -->
    <circle cx="10" cy="35" r="1.5" fill="#c00" stroke="none"/>
    <text x="22" y="39" class="label">Red dot = PZT center — apply adhesive here</text>

    <line x1="0" y1="50" x2="530" y2="50" stroke="#ddd" stroke-width="0.5"/>

    <text x="0" y="64" class="label-bold">How to use</text>
    <text x="0" y="78" class="inst">1. Print at 100% scale. Verify the 50 mm ruler with a physical ruler.</text>
    <text x="0" y="90" class="inst">2. Place glass slide face-down (underside up) on a working-copy outline, aligning all four edges.</text>
    <text x="0" y="102" class="inst">3. Apply a tiny drop of cyanoacrylate at each red center dot.</text>
    <text x="0" y="114" class="inst">4. Press 10 mm PZT disc onto each marked position. Hold 30 s. Cure 24 h.</text>
    <text x="0" y="126" class="inst">5. The two RX PZTs have 2.7 mm gap and 1.35 mm edge clearance — tight but functional.</text>
    <text x="0" y="138" class="inst">6. Wire: TX to AWG bus, RX_NE and RX_NW each to separate relay channels.</text>

    <line x1="0" y1="148" x2="530" y2="148" stroke="#ddd" stroke-width="0.5"/>

    <text x="0" y="162" class="label-bold">Dimensions (mm)</text>
    <text x="0" y="176" class="inst">Plate: 25.4 × 76.2 × 1 mm soda-lime glass (standard microscope slide)</text>
    <text x="0" y="188" class="inst">PZT: 10 mm dia × 0.5 mm ceramic disc (e.g., uxcell B07RK2V1P2)</text>
    <text x="0" y="200" class="inst">TX center: (12.7, 5.0) mm from near end — centered on width</text>
    <text x="0" y="212" class="inst">RX_NE center: (19.05, 71.2) mm — ¾ width, 5 mm from far end</text>
    <text x="0" y="224" class="inst">RX_NW center: (6.35, 71.2) mm — ¼ width, 5 mm from far end</text>
    <text x="0" y="236" class="inst">RX separation: 12.7 mm center-to-center. Edge clearance: 1.35 mm. PZT gap: 2.7 mm.</text>
    <text x="0" y="248" class="inst">Perturbation zone: ~56 mm × 25.4 mm between TX and RX ends (top surface)</text>
  </g>

